<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DRIPRUSH - Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBuzgGc5iumNCurtTpVM5X3_3TK95qbQpc",
            authDomain: "vroomiam.firebaseapp.com",
            databaseURL: "https://vroomiam-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "vroomiam",
            storageBucket: "vroomiam.firebasestorage.app",
            messagingSenderId: "13433812189",
            appId: "1:13433812189:web:40b8ba4b14cb0a4deb9734"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // RÉCUPÉRATION DES COMMANDES
        const ordersRef = ref(db, 'driprush_orders');
        onValue(ordersRef, (snapshot) => {
            const data = snapshot.val();
            const container = document.getElementById('orders-list');
            container.innerHTML = '';

            if (data) {
                Object.keys(data).reverse().forEach(id => {
                    const o = data[id];
                    const date = new Date(o.timestamp).toLocaleTimeString();
                    
                    container.innerHTML += `
                        <div class="bg-gray-900 border ${o.status === 'En livraison' ? 'border-blue-500/30' : 'border-white/5'} p-6 rounded-[2.5rem] mb-6 shadow-2xl relative overflow-hidden">
                            <div class="flex justify-between items-start mb-4">
                                <div>
                                    <span class="text-[10px] font-black px-4 py-1.5 rounded-full ${o.status === 'Attente Dépôt' ? 'bg-orange-500 text-black' : 'bg-blue-600 text-white'} uppercase italic">
                                        ${o.status}
                                    </span>
                                    <p class="text-[10px] text-gray-500 mt-2 font-bold uppercase tracking-widest">${date}</p>
                                </div>
                                <button onclick="deleteOrder('${id}')" class="bg-red-500/10 text-red-500 p-3 rounded-xl text-[10px] font-black uppercase">Supprimer</button>
                            </div>

                            <div class="space-y-4">
                                <h3 class="text-2xl font-black italic uppercase text-white">${o.clientName}</h3>
                                
                                <div class="bg-black/40 p-5 rounded-[2rem] border border-white/5 space-y-3">
                                    <p class="text-xs font-bold"><span class="text-orange-500">🛍️ ARTICLES :</span> ${o.items}</p>
                                    <p class="text-xs font-bold"><span class="text-orange-500">🏪 BOUTIQUE :</span> ${o.shopName}</p>
                                    <p class="text-xs font-bold"><span class="text-orange-500">📍 ADRESSE :</span> ${o.address}</p>
                                    <p class="text-xs font-bold"><span class="text-orange-500">📞 TEL :</span> ${o.phone}</p>
                                </div>

                                <div class="flex justify-between items-center bg-orange-500 p-4 rounded-2xl">
                                    <span class="text-black font-black uppercase text-[10px]">Total à encaisser</span>
                                    <span class="text-black font-black text-xl italic">${o.total.toLocaleString()} F</span>
                                </div>

                                <button onclick="sendWhatsAppRider('${id}')" class="w-full bg-white text-black py-5 rounded-2xl font-black uppercase text-xs italic shadow-xl active:scale-95 transition flex items-center justify-center gap-2">
                                    🚀 ENVOYER AU LIVREUR
                                </button>
                            </div>
                        </div>
                    `;
                });
            } else {
                container.innerHTML = '<div class="text-center py-20 text-gray-700 font-black italic uppercase">Aucune commande...</div>';
            }
        });

        // FONCTION WHATSAPP (GÉNÈRE LE MESSAGE POUR LE LIVREUR)
        window.sendWhatsAppRider = (id) => {
            const orderRef = ref(db, `driprush_orders/${id}`);
            onValue(orderRef, (snapshot) => {
                const o = snapshot.val();
                if(!o) return;

                const message = `✨ *COURSE DRIPRUSH*%0A%0A` +
                                `🏪 *RECUPÉRATION (BOUTIQUE)*%0A` +
                                `Nom : ${o.shopName}%0A` +
                                `📍 GPS : ${o.shopGPS}%0A%0A` +
                                `👤 *LIVRAISON (CLIENT)*%0A` +
                                `Client : ${o.clientName}%0A` +
                                `Articles : ${o.items}%0A` +
                                `Tel : ${o.phone}%0A` +
                                `📍 GPS : ${o.clientGPS}%0A%0A` +
                                `💰 *MONTANT : ${o.total} F*%0A%0A` +
                                `_Précise au client si le dépôt MoMo a été validé !_`;

                // CHANGE LE NUMÉRO CI-DESSOUS (Numéro du livreur)
                const riderPhone = "229XXXXXXXX"; 
                window.open(`https://wa.me/${riderPhone}?text=${message}`, '_blank');

                // On passe le statut en "En livraison"
                update(ref(db, `driprush_orders/${id}`), { status: 'En livraison' });
            }, { onlyOnce: true });
        };

        window.deleteOrder = (id) => {
            if(confirm("Supprimer définitivement ?")) {
                remove(ref(db, `driprush_orders/${id}`));
            }
        };

    </script>
</head>
<body class="bg-black text-white p-6 font-sans">

    <div class="max-w-md mx-auto">
        <header class="flex justify-between items-center mb-10">
            <div>
                <h1 class="text-3xl font-black italic text-orange-500 uppercase tracking-tighter">ADMIN</h1>
                <p class="text-[9px] text-gray-500 font-black uppercase tracking-[0.3em]">Driprush Control</p>
            </div>
            <div class="bg-gray-900 px-4 py-2 rounded-full border border-white/10">
                <span class="text-[10px] font-black italic text-orange-500">LIVE MONITORING</span>
            </div>
        </header>

        <div id="orders-list">
            </div>
    </div>

</body>
</html>
