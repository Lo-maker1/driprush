<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DRIPRUSH - Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght=400;600;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0b0b0b; color: #fff; }
        .order-card { background: linear-gradient(145deg, #141414, #1f1f1f); border: 1px solid #2a2a2a; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
    </style>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBuzgGc5iumNCurtTpVM5X3_3TK95qbQpc",
            authDomain: "vroomiam.firebaseapp.com",
            databaseURL: "https://vroomiam-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "vroomiam",
            storageBucket: "vroomiam.firebasestorage.app",
            messagingSenderId: "13433812189",
            appId: "1:13433812189:web:40b8ba4b14cb0a4deb9734"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const auth = getAuth(app);
        signInAnonymously(auth).catch((err) => console.error("Erreur auth anonyme:", err));

        const WEBHOOK_SERVER_URL = "https://driprush-webhook.onrender.com";
        const ADMIN_SESSION_MS = 24 * 60 * 60 * 1000;

        let allOrders = [];
        let allSecurityEvents = [];

        window.tryAdminLogin = (btn) => {
            const password = document.getElementById('admin-password').value;
            if (!password) return;

            const originalText = btn.innerText;
            btn.disabled = true;
            btn.innerText = "Vérification...";

            fetch(WEBHOOK_SERVER_URL + '/verify-admin', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ password })
            })
            .then(res => res.json())
            .then(data => {
                btn.disabled = false;
                btn.innerText = originalText;
                if (data.success) {
                    localStorage.setItem('driprush_admin_session', JSON.stringify({ loginTime: Date.now() }));
                    window.unlockDashboard();
                } else {
                    document.getElementById('admin-login-error').innerText = data.message || "Mot de passe incorrect.";
                    document.getElementById('admin-login-error').classList.remove('hidden');
                }
            })
            .catch(() => {
                btn.disabled = false;
                btn.innerText = originalText;
                document.getElementById('admin-login-error').innerText = "Erreur de connexion au serveur.";
                document.getElementById('admin-login-error').classList.remove('hidden');
            });
        };

        window.unlockDashboard = () => {
            document.getElementById('admin-login-screen').classList.add('hidden');
            document.getElementById('admin-dashboard').classList.remove('hidden');
            window.startListeners();
        };

        window.logoutAdmin = () => {
            localStorage.removeItem('driprush_admin_session');
            document.getElementById('admin-dashboard').classList.add('hidden');
            document.getElementById('admin-login-screen').classList.remove('hidden');
        };

        // 🆕 Gère maintenant 3 onglets : commandes, versements, sécurité
        window.setMainTab = (tab) => {
            ['commandes', 'versements', 'securite'].forEach(t => {
                document.getElementById('tab-' + t).classList.toggle('bg-orange-500', t === tab);
                document.getElementById('tab-' + t).classList.toggle('bg-white/5', t !== tab);
                document.getElementById('panel-' + t).classList.toggle('hidden', t !== tab);
            });
        };

        window.startListeners = () => {
            onValue(ref(db, 'driprush_orders'), (snapshot) => {
                const data = snapshot.val();
                allOrders = data ? Object.keys(data).map(id => ({ id, ...data[id] })).reverse() : [];
                window.renderDashboard();
                window.renderPayouts(); // 🆕
            }, (error) => console.error("Erreur Firebase:", error));

            onValue(ref(db, 'driprush_security_events'), (snapshot) => {
                const data = snapshot.val();
                allSecurityEvents = data ? Object.keys(data).map(id => ({ id, ...data[id] })).reverse() : [];
                window.renderSecurityEvents();
            }, (error) => console.error("Erreur Firebase sécurité:", error));
        };

        const EVENT_LABELS = {
            signature_invalide: { icon: '🚨', label: 'Signature webhook invalide', color: 'text-red-400 bg-red-500/10' },
            connexion_ratee: { icon: '⚠️', label: 'Connexion boutique ratée', color: 'text-amber-400 bg-amber-500/10' },
            connexion_bloquee: { icon: '🔒', label: 'Boutique bloquée (5 tentatives)', color: 'text-red-400 bg-red-500/10' },
            montant_suspect: { icon: '🚨', label: 'Montant de paiement suspect', color: 'text-red-400 bg-red-500/10' },
            admin_bloque: { icon: '🔒', label: 'Accès admin bloqué (5 tentatives)', color: 'text-red-400 bg-red-500/10' }
        };

        window.renderSecurityEvents = () => {
            const container = document.getElementById('security-events-list');
            container.innerHTML = '';

            if (allSecurityEvents.length === 0) {
                container.innerHTML = `<div class="text-center py-20 text-gray-600 font-black italic uppercase text-xs tracking-widest">Aucun événement de sécurité — tout est calme ✅</div>`;
                return;
            }

            allSecurityEvents.slice(0, 100).forEach(e => {
                const info = EVENT_LABELS[e.type] || { icon: '❔', label: e.type, color: 'text-gray-400 bg-white/5' };
                const date = new Date(e.timestamp).toLocaleString('fr-FR');
                container.innerHTML += `
                    <div class="order-card p-4 rounded-2xl flex items-start gap-3">
                        <span class="text-lg">${info.icon}</span>
                        <div class="flex-1">
                            <p class="text-xs font-black ${info.color.split(' ')[0]} uppercase">${info.label}</p>
                            <p class="text-[10px] text-gray-400 mt-0.5">${e.detail || ''}</p>
                            <p class="text-[9px] text-gray-600 mt-1">${date}</p>
                        </div>
                    </div>`;
            });
        };

        // 🆕 === VERSEMENTS MANUELS AUX BOUTIQUES ===
        window.renderPayouts = () => {
            const container = document.getElementById('payouts-list');
            container.innerHTML = '';

            const realOrders = allOrders.filter(o => (o.status === 'Payée' || o.status === 'Livrée') && o.status !== 'Payée (TEST)');
            const toPay = realOrders.filter(o => !o.manualPayoutDone);
            const alreadyPaid = realOrders.filter(o => o.manualPayoutDone);

            const totalToPay = toPay.reduce((sum, o) => sum + (o.montantBoutique || 0), 0);
            document.getElementById('stat-to-pay-total').innerText = totalToPay.toLocaleString() + " F";
            document.getElementById('stat-to-pay-count').innerText = toPay.length;

            if (toPay.length === 0) {
                container.innerHTML = `<div class="text-center py-16 text-gray-600 font-black italic uppercase text-xs tracking-widest">Aucun versement en attente — tout est à jour ✅</div>`;
            } else {
                toPay.forEach(o => {
                    const momo = o.shopMomo || o.shopPhone || 'Non renseigné';
                    container.innerHTML += `
                        <div class="order-card p-5 rounded-3xl mb-3">
                            <div class="flex justify-between items-start mb-3">
                                <div>
                                    <p class="text-[9px] text-gray-500 font-bold uppercase">Boutique</p>
                                    <p class="text-sm font-black uppercase">${o.shopName || 'Driprush'}</p>
                                </div>
                                <span class="text-[9px] font-black px-2 py-1 rounded-full bg-amber-500/15 text-amber-400 uppercase">En attente</span>
                            </div>
                            <div class="bg-black/40 rounded-2xl p-3 mb-3 flex justify-between items-center">
                                <div>
                                    <p class="text-[9px] text-gray-500 uppercase font-bold">Mobile Money</p>
                                    <p class="text-sm font-black text-orange-400">${momo}</p>
                                </div>
                                <button onclick="navigator.clipboard.writeText('${momo}').then(() => alert('Numéro copié : ${momo}'))" class="bg-white/10 px-3 py-2 rounded-xl text-[9px] font-black uppercase">📋 Copier</button>
                            </div>
                            <div class="flex justify-between items-center mb-4">
                                <span class="text-[9px] text-gray-500 uppercase font-bold">Montant à verser (90%)</span>
                                <span class="text-lg font-black text-emerald-400">${(o.montantBoutique || 0).toLocaleString()} F</span>
                            </div>
                            <button onclick="window.markPayoutDone('${o.id}')" class="w-full bg-emerald-500 hover:bg-emerald-600 text-black py-3 rounded-xl text-[10px] font-black uppercase tracking-wider transition">
                                ✅ Marquer comme versé
                            </button>
                        </div>`;
                });
            }

            document.getElementById('payouts-done-count').innerText = alreadyPaid.length + " déjà versée(s)";
        };

        window.markPayoutDone = (orderId) => {
            if (!confirm("Confirmer que ce versement a bien été effectué manuellement ?")) return;
            update(ref(db, `driprush_orders/${orderId}`), { manualPayoutDone: true, manualPayoutDate: Date.now() })
                .catch((err) => alert("Erreur : " + err.message));
        };

        window.renderDashboard = () => {
            const container = document.getElementById('orders-container');
            container.innerHTML = '';

            let totalPlatformRevenue = 0;
            let toProcessCount = 0;
            let deliveredCount = 0;

            allOrders.forEach(order => {
                const isPaid = order.status === 'Payée' || order.status === 'Payée (TEST)';
                const isDelivered = order.status === 'Livrée';
                const isTest = order.status === 'Payée (TEST)';

                if (isPaid || isDelivered) totalPlatformRevenue += (order.commission || 0);
                if (isPaid) toProcessCount++;
                if (isDelivered) deliveredCount++;

                const statusColor = isDelivered ? 'text-blue-400 bg-blue-500/10 border-blue-500/20' :
                                    isPaid ? 'text-green-400 bg-green-500/10 border-green-500/20' :
                                    'text-amber-400 bg-amber-500/10 border-amber-500/20';

                container.innerHTML += `
                    <div class="order-card p-5 rounded-3xl space-y-4 shadow-xl transition-all hover:scale-[1.01]">
                        ${isTest ? '<p class="text-[9px] text-yellow-400 font-black uppercase">🧪 Commande Test</p>' : ''}
                        <div class="flex justify-between items-start border-b border-white/5 pb-3">
                            <div>
                                <span class="text-[9px] font-black uppercase tracking-widest text-gray-500">Boutique Partenaire</span>
                                <h3 class="text-sm font-black text-white uppercase">${order.shopName || 'Driprush'}</h3>
                                <p class="text-[10px] text-gray-400 font-semibold">${order.shopPhone || 'Pas de numéro'}</p>
                            </div>
                            <span class="text-[9px] font-black px-3 py-1.5 rounded-full border ${statusColor} uppercase tracking-wider">
                                ${order.status}
                            </span>
                        </div>

                        <div class="grid grid-cols-2 gap-4 text-xs">
                            <div>
                                <p class="text-[9px] text-gray-500 font-bold uppercase mb-0.5">Client</p>
                                <p class="font-bold text-gray-200">${order.clientName}</p>
                                <p class="text-gray-400 font-medium">${order.phone}</p>
                                <p class="text-[10px] text-gray-400 italic mt-1 line-clamp-1">📍 ${order.address}</p>
                            </div>
                            <div>
                                <p class="text-[9px] text-gray-500 font-bold uppercase mb-0.5">Articles & Options</p>
                                <p class="font-bold text-gray-200 uppercase line-clamp-2">${order.items}</p>
                                <span class="inline-block mt-1 text-[8px] bg-orange-500/20 text-orange-400 px-2 py-0.5 rounded font-black uppercase">
                                    Option: ${order.deliveryMode || 'normale'}
                                </span>
                            </div>
                        </div>

                        <div class="bg-black/40 p-3 rounded-2xl flex justify-between items-center text-xs">
                            <div>
                                <p class="text-[9px] text-gray-500 font-bold uppercase">Total Global encaissé</p>
                                <p class="text-sm font-black text-white">${parseInt(order.total).toLocaleString()} F</p>
                            </div>
                            <div class="text-right">
                                <p class="text-[9px] text-orange-500 font-bold uppercase">Ta Commission (10%)</p>
                                <p class="text-sm font-black text-orange-400">${(order.commission || 0).toLocaleString()} F</p>
                            </div>
                        </div>

                        ${order.manualPayoutDone ? `
                        <div class="bg-emerald-500/10 p-3 rounded-2xl flex justify-between items-center text-xs">
                            <span class="text-[9px] text-emerald-400 font-bold uppercase">💸 Versé manuellement</span>
                            <span class="text-[10px] font-black text-emerald-400">${new Date(order.manualPayoutDate).toLocaleDateString('fr-FR')}</span>
                        </div>` : ''}

                        <div class="grid grid-cols-2 gap-2 pt-1">
                            <a href="${order.clientGPS}" target="_blank" class="bg-white/5 border border-white/10 hover:bg-white/10 text-white text-center py-3 rounded-xl text-[10px] font-black uppercase tracking-wider transition">
                                <i class="fa-solid fa-location-dot text-red-500 mr-1"></i> GPS Client
                            </a>
                            ${!isDelivered ? `
                                <button onclick="updateStatus('${order.id}', 'Livrée')" class="bg-emerald-500 hover:bg-emerald-600 text-black py-3 rounded-xl text-[10px] font-black uppercase tracking-wider transition">
                                    Marquer Livrée ✓
                                </button>` : `
                                <div class="bg-white/5 text-gray-500 text-center py-3 rounded-xl text-[10px] font-black uppercase tracking-wider">
                                    ✓ Déjà livrée
                                </div>`}
                        </div>
                    </div>`;
            });

            document.getElementById('stat-revenue').innerText = totalPlatformRevenue.toLocaleString() + " F";
            document.getElementById('stat-pending').innerText = toProcessCount;
            document.getElementById('stat-active').innerText = deliveredCount;

            if(allOrders.length === 0) {
                container.innerHTML = `<div class="text-center py-20 text-gray-600 font-black italic uppercase text-xs tracking-widest">Aucune commande enregistrée...</div>`;
            }
        };

        window.updateStatus = (orderId, newStatus) => {
            if(confirm(`Passer la commande en statut "${newStatus}" ?`)) {
                update(ref(db, `driprush_orders/${orderId}`), { status: newStatus })
                    .then(() => alert("Statut mis à jour avec succès !"))
                    .catch((err) => alert("Erreur : " + err.message));
            }
        };

        const savedAdminSession = localStorage.getItem('driprush_admin_session');
        if (savedAdminSession) {
            try {
                const { loginTime } = JSON.parse(savedAdminSession);
                if (Date.now() - loginTime < ADMIN_SESSION_MS) {
                    window.addEventListener('DOMContentLoaded', window.unlockDashboard);
                } else {
                    localStorage.removeItem('driprush_admin_session');
                }
            } catch(e) {
                localStorage.removeItem('driprush_admin_session');
            }
        }
    </script>
</head>
<body class="p-4 md:p-8 bg-[#070707] min-h-screen pb-24">

    <!-- ÉCRAN DE CONNEXION ADMIN -->
    <div id="admin-login-screen" class="max-w-sm mx-auto pt-24 text-center">
        <h1 class="text-2xl font-black italic tracking-tighter uppercase text-white mb-1">DRIPRUSH ADMIN</h1>
        <p class="text-[9px] text-orange-500 font-black uppercase tracking-[0.2em] mb-10">Accès restreint</p>
        <input id="admin-password" type="password" placeholder="MOT DE PASSE ADMIN" class="w-full bg-[#121212] border border-white/10 p-4 rounded-2xl text-sm font-bold outline-none focus:border-orange-500 text-center mb-3">
        <p id="admin-login-error" class="hidden text-[10px] text-red-400 font-bold uppercase mb-3"></p>
        <button onclick="window.tryAdminLogin(this)" class="w-full bg-orange-500 text-black font-black py-4 rounded-2xl text-sm uppercase italic active:scale-95 transition">
            Déverrouiller 🔓
        </button>
    </div>

    <!-- TABLEAU DE BORD (masqué jusqu'à connexion) -->
    <div id="admin-dashboard" class="hidden">
        <header class="mb-6 space-y-4">
            <div class="flex justify-between items-center">
                <div>
                    <h1 class="text-2xl font-black italic tracking-tighter uppercase text-white">DRIPRUSH ADMIN</h1>
                    <p class="text-[9px] text-orange-500 font-black uppercase tracking-[0.2em]">Gestion de vos bénéfices</p>
                </div>
                <button onclick="window.logoutAdmin()" class="bg-white/5 w-10 h-10 rounded-full flex items-center justify-center border border-white/10">
                    <i class="fa-solid fa-lock text-orange-400 text-sm"></i>
                </button>
            </div>

            <div class="grid grid-cols-3 gap-3">
                <div class="bg-[#121212] border border-white/5 p-4 rounded-2xl">
                    <p class="text-[7px] font-black text-gray-500 uppercase tracking-wider mb-1">Mes Gains (10%)</p>
                    <p id="stat-revenue" class="text-xs font-black text-orange-400 italic">0 F</p>
                </div>
                <div class="bg-[#121212] border border-white/5 p-4 rounded-2xl">
                    <p class="text-[7px] font-black text-gray-500 uppercase tracking-wider mb-1">À traiter</p>
                    <p id="stat-pending" class="text-base font-black text-amber-400">0</p>
                </div>
                <div class="bg-[#121212] border border-white/5 p-4 rounded-2xl">
                    <p class="text-[7px] font-black text-gray-500 uppercase tracking-wider mb-1">Livrées</p>
                    <p id="stat-active" class="text-base font-black text-green-400">0</p>
                </div>
            </div>

            <!-- 🆕 3 onglets au lieu de 2 -->
            <div class="grid grid-cols-3 gap-2">
                <button onclick="window.setMainTab('commandes')" id="tab-commandes" class="bg-orange-500 text-black py-3 rounded-xl text-[9px] font-black uppercase transition">📦 Commandes</button>
                <button onclick="window.setMainTab('versements')" id="tab-versements" class="bg-white/5 text-gray-400 py-3 rounded-xl text-[9px] font-black uppercase transition">💸 Versements</button>
                <button onclick="window.setMainTab('securite')" id="tab-securite" class="bg-white/5 text-gray-400 py-3 rounded-xl text-[9px] font-black uppercase transition">🛡️ Sécurité</button>
            </div>
        </header>

        <main id="panel-commandes" class="space-y-4">
            <h2 class="text-[10px] font-black text-gray-400 uppercase tracking-[0.3em] mb-2">Flux des Commandes</h2>
            <div id="orders-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
        </main>

        <!-- 🆕 NOUVEAU PANNEAU VERSEMENTS -->
        <main id="panel-versements" class="hidden space-y-4">
            <div class="grid grid-cols-2 gap-3 mb-4">
                <div class="bg-[#121212] border border-amber-500/20 p-4 rounded-2xl">
                    <p class="text-[7px] font-black text-gray-500 uppercase tracking-wider mb-1">Total à verser</p>
                    <p id="stat-to-pay-total" class="text-base font-black text-amber-400">0 F</p>
                </div>
                <div class="bg-[#121212] border border-white/5 p-4 rounded-2xl">
                    <p class="text-[7px] font-black text-gray-500 uppercase tracking-wider mb-1">Commandes en attente</p>
                    <p id="stat-to-pay-count" class="text-base font-black text-white">0</p>
                </div>
            </div>
            <h2 class="text-[10px] font-black text-gray-400 uppercase tracking-[0.3em] mb-2">Versements à faire</h2>
            <div id="payouts-list" class="max-w-md"></div>
            <p id="payouts-done-count" class="text-[9px] text-gray-500 font-bold uppercase text-center mt-4"></p>
        </main>

        <main id="panel-securite" class="hidden space-y-4">
            <h2 class="text-[10px] font-black text-gray-400 uppercase tracking-[0.3em] mb-2">Événements de Sécurité (100 derniers)</h2>
            <div id="security-events-list" class="grid grid-cols-1 md:grid-cols-2 gap-3"></div>
        </main>
    </div>

</body>
</html>
