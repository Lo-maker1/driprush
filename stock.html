<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DRIPRUSH - Gestion Stock</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBuzgGc5iumNCurtTpVM5X3_3TK95qbQpc",
            authDomain: "vroomiam.firebaseapp.com",
            databaseURL: "https://vroomiam-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "vroomiam",
            storageBucket: "vroomiam.firebasestorage.app",
            messagingSenderId: "13433812189",
            appId: "1:13433812189:web:40b8ba4b14cb0a4deb9734"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const auth = getAuth(app);
        signInAnonymously(auth).catch((err) => console.error("Erreur auth anonyme:", err));

        let knownBoutiques = {};

        // Charge la liste des boutiques déjà enregistrées pour le menu déroulant
        onValue(ref(db, 'driprush_boutiques'), (snapshot) => {
            const data = snapshot.val();
            knownBoutiques = data || {};
            const select = document.getElementById('p-shop-select');
            select.innerHTML = '<option value="">— Choisir une boutique enregistrée —</option>';
            Object.values(knownBoutiques)
                .sort((a, b) => a.name.localeCompare(b.name))
                .forEach(b => {
                    select.innerHTML += `<option value="${b.phone}">${b.name}</option>`;
                });
            select.innerHTML += '<option value="__new__">➕ Nouvelle boutique (pas encore dans le système)</option>';
        });

        // Remplit automatiquement les champs quand on choisit une boutique dans la liste
        window.onShopSelect = () => {
            const phone = document.getElementById('p-shop-select').value;
            const nameInput = document.getElementById('p-shop');
            const phoneInput = document.getElementById('p-shop-phone');
            const gpsInput = document.getElementById('p-shop-gps');
            const manualFields = document.getElementById('manual-shop-fields');

            if (phone === '__new__') {
                nameInput.value = '';
                phoneInput.value = '';
                gpsInput.value = '';
                nameInput.readOnly = false;
                phoneInput.readOnly = false;
                manualFields.classList.remove('opacity-50');
                nameInput.focus();
            } else if (phone && knownBoutiques[phone]) {
                const b = knownBoutiques[phone];
                nameInput.value = b.name;
                phoneInput.value = b.phone;
                gpsInput.value = b.gps || '';
                nameInput.readOnly = true;
                phoneInput.readOnly = true;
                manualFields.classList.add('opacity-50');
            } else {
                nameInput.value = '';
                phoneInput.value = '';
                gpsInput.value = '';
            }
        };

        window.getShopGPS = () => {
            const btn = document.getElementById('gps-btn');
            btn.innerText = "Recherche...";
            
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition((pos) => {
                    const lat = pos.coords.latitude;
                    const lon = pos.coords.longitude;
                    
                    const link = `https://www.google.com/maps?q=${lat},${lon}`;
                    
                    document.getElementById('p-shop-gps').value = link;
                    btn.innerText = "📍 GPS Boutique OK !";
                    btn.classList.replace('bg-white/5', 'bg-green-500/20');
                    btn.classList.replace('text-orange-500', 'text-green-500');
                }, (err) => {
                    alert("Erreur GPS : Active ta localisation sur ton téléphone");
                    btn.innerText = "📍 Réessayer";
                });
            } else {
                alert("GPS non supporté par ce téléphone");
            }
        };

        window.addProduct = () => {
            const name = document.getElementById('p-name').value;
            const price = parseInt(document.getElementById('p-price').value);
            const image = document.getElementById('p-img').value;
            const type = document.getElementById('p-type').value; 
            const genre = document.getElementById('p-genre').value; 
            const sizes = document.getElementById('p-sizes').value || "N/A";
            const shopName = document.getElementById('p-shop').value; 
            const shopPhone = document.getElementById('p-shop-phone').value; 
            const shopGPS = document.getElementById('p-shop-gps').value;
            const deliveryStandard = parseInt(document.getElementById('p-delivery-std').value) || 0;
            const deliveryExpress = parseInt(document.getElementById('p-delivery-exp').value) || 0;

            if(!name || !price || !image) return alert("Remplis au moins Nom, Prix et Image !");
            if(!document.getElementById('p-shop-select').value) return alert("Choisis une boutique dans la liste (ou 'Nouvelle boutique') !");
            if(!shopGPS) return alert("Capture le GPS ou colle un lien Google Maps !");
            if(!shopPhone) return alert("Ajoute le numéro WhatsApp de la boutique !");
            if(!shopName) return alert("Donne un nom à la boutique !");

            const productRef = push(ref(db, 'driprush_products'));
            set(productRef, { 
                name, 
                price, 
                image, 
                type, 
                genre, 
                sizes, 
                shopName, 
                shopPhone, 
                shopGPS, 
                deliveryStandard,
                deliveryExpress,
                timestamp: Date.now() 
            }).then(() => {
                alert("Article ajouté au catalogue Driprush ! ✅ (Boutique : " + shopName + ")");
                
                document.getElementById('p-form').reset();
                document.getElementById('p-shop').readOnly = false;
                document.getElementById('p-shop-phone').readOnly = false;
                const btn = document.getElementById('gps-btn');
                btn.innerText = "📍 Capturer GPS Boutique";
                btn.className = "flex-1 bg-white/5 border border-white/10 p-4 rounded-2xl text-[10px] font-black text-orange-500 uppercase tracking-widest transition-all active:scale-95";
                document.getElementById('p-shop-gps').value = "";
            }).catch((error) => {
                alert("Erreur Firebase : " + error.message);
            });
        };
    </script>
</head>
<body class="bg-black text-white p-6 font-sans">
    <div class="max-w-md mx-auto">
        <header class="mb-8">
            <h1 class="text-3xl font-black text-orange-500 italic uppercase tracking-tighter">DRIPRUSH STOCK</h1>
            <p class="text-[9px] text-gray-500 font-black uppercase tracking-widest">Interface d'ajout catalogue</p>
        </header>
        
        <form id="p-form" class="space-y-4 bg-gray-900 p-6 rounded-[2.5rem] border border-white/5 shadow-2xl">
            <div>
                <label class="text-[10px] font-black text-gray-500 uppercase ml-2">Nom du produit</label>
                <input id="p-name" type="text" placeholder="ex: Jordan 4 ou Sauvage ML" class="w-full bg-black p-4 rounded-2xl border border-white/10 outline-none focus:border-orange-500 font-bold">
            </div>
            
            <div>
                <label class="text-[10px] font-black text-gray-500 uppercase ml-2">Prix de vente (F)</label>
                <input id="p-price" type="number" placeholder="ex: 85000" class="w-full bg-black p-4 rounded-2xl border border-white/10 outline-none focus:border-orange-500 text-orange-500 font-black">
            </div>

            <div>
                <label class="text-[10px] font-black text-gray-500 uppercase ml-2">Lien Photo (URL)</label>
                <input id="p-img" type="text" placeholder="Colle le lien de l'image ici" class="w-full bg-black p-4 rounded-2xl border border-white/10 outline-none focus:border-orange-500 text-xs">
            </div>

            <div class="grid grid-cols-2 gap-2">
                <div>
                    <label class="text-[10px] font-black text-gray-500 uppercase ml-2">Catégorie</label>
                    <select id="p-type" class="w-full bg-black p-4 rounded-2xl border border-white/10 outline-none text-xs font-bold">
                        <option value="vetement">👕 Vêtement</option>
                        <option value="chaussure">👟 Chaussure</option>
                        <option value="parfum">🧴 Parfum</option>
                        <option value="accessoire">✨ Accessoire</option>
                    </select>
                </div>
                <div>
                    <label class="text-[10px] font-black text-gray-500 uppercase ml-2">Genre</label>
                    <select id="p-genre" class="w-full bg-black p-4 rounded-2xl border border-white/10 outline-none text-xs font-bold">
                        <option value="homme">HOMME</option>
                        <option value="femme">FEMME</option>
                        <option value="mixte">MIXTE</option>
                        <option value="enfant">ENFANT</option>
                    </select>
                </div>
            </div>

            <div>
                <label class="text-[10px] font-black text-orange-500 uppercase ml-2">Boutique (choisis dans la liste)</label>
                <select id="p-shop-select" onchange="window.onShopSelect()" class="w-full bg-black p-4 rounded-2xl border border-orange-500/50 outline-none text-xs font-bold mb-3">
                    <option value="">— Choisir une boutique enregistrée —</option>
                </select>
            </div>

            <div id="manual-shop-fields" class="grid grid-cols-2 gap-2">
                <div>
                    <label class="text-[10px] font-black text-gray-500 uppercase ml-2">Nom Boutique</label>
                    <input id="p-shop" type="text" placeholder="Auto-rempli" readonly class="w-full bg-black p-4 rounded-2xl border border-white/10 outline-none text-xs font-bold uppercase">
                </div>
                <div>
                    <label class="text-[10px] font-black text-gray-500 uppercase ml-2">WhatsApp Boutique</label>
                    <input id="p-shop-phone" type="text" placeholder="Auto-rempli" readonly class="w-full bg-black p-4 rounded-2xl border border-white/10 outline-none focus:border-orange-500 font-bold">
                </div>
            </div>

            <div>
                <label class="text-[10px] font-black text-gray-500 uppercase ml-2">Localisation Boutique (GPS)</label>
                <div class="flex gap-2 mb-2">
                    <button type="button" id="gps-btn" onclick="getShopGPS()" class="flex-1 bg-white/5 border border-white/10 p-4 rounded-2xl text-[10px] font-black text-orange-500 uppercase tracking-widest transition-all active:scale-95">
                        📍 Capturer GPS
                    </button>
                </div>
                <input id="p-shop-gps" type="text" placeholder="Auto-rempli si boutique connue, sinon colle un lien Google Maps" class="w-full bg-black p-4 rounded-2xl border border-white/10 outline-none focus:border-orange-500 text-[10px] text-gray-400">
            </div>

            <div>
                <label class="text-[10px] font-black text-gray-500 uppercase ml-2">Tailles / ML (Optionnel)</label>
                <input id="p-sizes" type="text" placeholder="ex: S, M, L ou 100ml" class="w-full bg-black p-4 rounded-2xl border border-white/10 outline-none focus:border-orange-500 font-bold">
            </div>

            <div class="grid grid-cols-2 gap-2">
                <div>
                    <label class="text-[10px] font-black text-gray-500 uppercase ml-2">Livraison normale (F)</label>
                    <input id="p-delivery-std" type="number" placeholder="ex: 500" class="w-full bg-black p-4 rounded-2xl border border-white/10 outline-none focus:border-orange-500 text-xs font-bold">
                </div>
                <div>
                    <label class="text-[10px] font-black text-gray-500 uppercase ml-2">Livraison rapide (F)</label>
                    <input id="p-delivery-exp" type="number" placeholder="ex: 1000" class="w-full bg-black p-4 rounded-2xl border border-white/10 outline-none focus:border-orange-500 text-xs font-bold">
                </div>
            </div>

            <button type="button" onclick="addProduct()" class="w-full bg-orange-500 text-black py-5 rounded-[2rem] font-black uppercase italic shadow-lg active:scale-95 transition mt-4">
                Ajouter au catalogue 🚀
            </button>
        </form>
    </div>
</body>
</html>
