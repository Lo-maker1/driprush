<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DRIPRUSH - Stock Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0b0b0b; color: #fff; }
        .input-card { background-color: #141414; border: 1px solid #222; }
    </style>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBuzgGc5iumNCurtTpVM5X3_3TK95qbQpc",
            authDomain: "vroomiam.firebaseapp.com",
            databaseURL: "https://vroomiam-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "vroomiam",
            storageBucket: "vroomiam.firebasestorage.app",
            messagingSenderId: "13433812189",
            appId: "1:13433812189:web:40b8ba4b14cb0a4deb9734"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.addProduct = () => {
            const name = document.getElementById('p-name').value;
            const price = document.getElementById('p-price').value;
            const image = document.getElementById('p-img').value;
            const genre = document.getElementById('p-genre').value;
            const sizes = document.getElementById('p-sizes').value;
            const shopName = document.getElementById('p-shop-name').value;
            const shopPhone = document.getElementById('p-shop-phone').value;
            const shopGPS = document.getElementById('p-shop-gps').value;
            
            // NOUVEAUX CHAMPS : Prix de livraisons spécifiques à l'article
            const deliveryStandard = document.getElementById('p-delivery-standard').value;
            const deliveryExpress = document.getElementById('p-delivery-express').value;

            if(!name || !price || !image || !shopName || !shopPhone || !deliveryStandard || !deliveryExpress) {
                return alert("Veuillez remplir tous les champs obligatoires (incluant les frais de livraison) !");
            }

            const productsRef = ref(db, 'driprush_products');
            const newProductRef = push(productsRef);

            set(newProductRef, {
                name,
                price: parseInt(price),
                image,
                genre,
                sizes: sizes || "N/A",
                shopName,
                shopPhone,
                shopGPS: shopGPS || "Non renseigné",
                deliveryStandard: parseInt(deliveryStandard),
                deliveryExpress: parseInt(deliveryExpress),
                timestamp: Date.now()
            }).then(() => {
                alert("🔥 Article ajouté avec succès au catalogue !");
                document.getElementById('product-form').reset();
            }).catch(() => {
                alert("Erreur lors de l'ajout. Vérifie ta connexion.");
            });
        };
    </script>
</head>
<body class="p-4 md:p-10 flex flex-col items-center min-h-screen">

    <header class="w-full max-w-xl mb-6">
        <h1 class="text-2xl font-black italic tracking-tighter uppercase">DRIPRUSH AJOUT STOCK</h1>
        <p class="text-[9px] text-orange-500 font-black uppercase tracking-widest">Mettre à jour le catalogue premium</p>
    </header>

    <main class="w-full max-w-xl">
        <form id="product-form" onsubmit="event.preventDefault(); addProduct();" class="input-card p-6 rounded-3xl space-y-4 shadow-2xl">
            
            <div>
                <label class="text-[9px] font-black text-gray-400 uppercase tracking-wider block mb-1">Détails de l'article</label>
                <div class="grid grid-cols-2 gap-3">
                    <input id="p-name" placeholder="Nom de l'article" class="bg-black/50 w-full p-4 rounded-xl border border-white/5 text-xs font-bold uppercase outline-none focus:border-white">
                    <input id="p-price" type="number" placeholder="Prix de vente (F CFA)" class="bg-black/50 w-full p-4 rounded-xl border border-white/5 text-xs font-bold outline-none focus:border-white">
                </div>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <input id="p-img" placeholder="URL absolue de l'image" class="bg-black/50 w-full p-4 rounded-xl border border-white/5 text-xs font-bold outline-none focus:border-white">
                <input id="p-sizes" placeholder="Tailles dispos (ex: M, XL, 42)" class="bg-black/50 w-full p-4 rounded-xl border border-white/5 text-xs font-bold uppercase outline-none focus:border-white">
            </div>

            <div>
                <label class="text-[9px] font-black text-gray-400 uppercase tracking-wider block mb-1">Genre de l'article</label>
                <select id="p-genre" class="bg-black/50 w-full p-4 rounded-xl border border-white/5 text-xs font-bold uppercase outline-none focus:border-white text-gray-400">
                    <option value="mixte">Mixte / Unisexe</option>
                    <option value="homme">Homme</option>
                    <option value="femme">Femme</option>
                    <option value="enfant">Enfant</option>
                </select>
            </div>

            <!-- SECTION NOUVELLE : Configuration logistique de la boutique -->
            <div class="border-t border-white/5 pt-3">
                <label class="text-[9px] font-black text-orange-500 uppercase tracking-wider block mb-1">Tarifs de Livraison de la Boutique pour cet article</label>
                <div class="grid grid-cols-2 gap-3">
                    <input id="p-delivery-standard" type="number" placeholder="Frais Livraison Standard (F)" class="bg-black/50 w-full p-4 rounded-xl border border-orange-500/20 text-xs font-bold outline-none focus:border-orange-500">
                    <input id="p-delivery-express" type="number" placeholder="Frais Livraison Rapide (F)" class="bg-black/50 w-full p-4 rounded-xl border border-orange-500/20 text-xs font-bold outline-none focus:border-orange-500">
                </div>
            </div>

            <div class="border-t border-white/5 pt-3">
                <label class="text-[9px] font-black text-gray-400 uppercase tracking-wider block mb-1">Informations Boutique Partenaire</label>
                <input id="p-shop-name" placeholder="Nom de la boutique" class="bg-black/50 w-full p-4 rounded-xl border border-white/5 text-xs font-bold uppercase outline-none focus:border-white mb-3">
                <div class="grid grid-cols-2 gap-3">
                    <input id="p-shop-phone" type="tel" placeholder="WhatsApp Boutique (ex: 229...)" class="bg-black/50 w-full p-4 rounded-xl border border-white/5 text-xs font-bold outline-none focus:border-white">
                    <input id="p-shop-gps" placeholder="Lien Google Maps GPS Boutique" class="bg-black/50 w-full p-4 rounded-xl border border-white/5 text-xs font-bold outline-none focus:border-white">
                </div>
            </div>

            <button type="submit" class="w-full bg-white text-black font-black uppercase italic py-4 rounded-2xl text-xs tracking-wider shadow-xl hover:bg-gray-100 transition duration-300">
                Ajouter l'article au catalogue 🔥
            </button>
        </form>
    </main>

</body>
</html>
