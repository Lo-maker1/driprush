<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DRIPRUSH - Gestion Stock</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // TA CONFIGURATION (La même que Vroomiam)
        const firebaseConfig = {
            apiKey: "AIzaSyBuzgGc5iumNCurtTpVM5X3_3TK95qbQpc",
            authDomain: "vroomiam.firebaseapp.com",
            databaseURL: "https://vroomiam-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "vroomiam",
            storageBucket: "vroomiam.firebasestorage.app",
            messagingSenderId: "13433812189",
            appId: "1:13433812189:web:40b8ba4b14cb0a4deb9734"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // FONCTION POUR CAPTURER LE GPS DE LA BOUTIQUE
        window.getShopGPS = () => {
            const btn = document.getElementById('gps-btn');
            btn.innerText = "Recherche...";
            
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition((pos) => {
                    const lat = pos.coords.latitude;
                    const lon = pos.coords.longitude;
                    const link = `https://www.google.com/maps?q=${lat},${lon}`;
                    
                    document.getElementById('p-shop-gps').value = link;
                    btn.innerText = "📍 GPS Boutique OK !";
                    btn.classList.replace('bg-white/5', 'bg-green-500/20');
                    btn.classList.replace('text-orange-500', 'text-green-500');
                }, (err) => {
                    alert("Erreur GPS : Active ta localisation");
                    btn.innerText = "📍 Réessayer";
                });
            } else {
                alert("GPS non supporté par ce téléphone");
            }
        };

        window.addProduct = () => {
            const name = document.getElementById('p-name').value;
            const price = parseInt(document.getElementById('p-price').value);
            const image = document.getElementById('p-img').value;
            const type = document.getElementById('p-type').value; 
            const sizes = document.getElementById('p-sizes').value;
            const shop = document.getElementById('p-shop').value;
            const shopGPS = document.getElementById('p-shop-gps').value;

            if(!name || !price || !image) return alert("Remplis au moins Nom, Prix et Image !");
            if(!shopGPS) return alert("Clique sur 'Capturer GPS' pour localiser la boutique !");

            // ON ENVOIE DANS LE TIROIR 'driprush_products'
            const productRef = push(ref(db, 'driprush_products'));
            set(productRef, { 
                name, 
                price, 
                image, 
                type, 
                sizes, 
                shop, 
                shopGPS, // Enregistre le lien maps de la boutique
                timestamp: Date.now() 
            });
            
            alert("Article ajouté au catalogue Driprush ! ✅");
            
            // Remise à zéro du formulaire et du bouton GPS
            document.getElementById('p-form').reset();
            const btn = document.getElementById('gps-btn');
            btn.innerText = "📍 Capturer GPS Boutique";
            btn.classList.replace('bg-green-500/20', 'bg-white/5');
            btn.classList.replace('text-green-500', 'text-orange-500');
            document.getElementById('p-shop-gps').value = "";
        };
    </script>
</head>
<body class="bg-black text-white p-6 font-sans">
    <div class="max-w-md mx-auto">
        <h1 class="text-3xl font-black text-orange-500 italic mb-8 uppercase tracking-tighter">DRIPRUSH STOCK</h1>
        
        <form id="p-form" class="space-y-4 bg-gray-900 p-6 rounded-[2.5rem] border border-white/5 shadow-2xl">
            <div>
                <label class="text-[10px] font-black text-gray-500 uppercase ml-2">Nom du produit</label>
                <input id="p-name" type="text" placeholder="ex: Jordan 4 Black Cat" class="w-full bg-black p-4 rounded-2xl border border-white/10 outline-none focus:border-orange-500 font-bold">
            </div>
            
            <div>
                <label class="text-[10px] font-black text-gray-500 uppercase ml-2">Prix (F)</label>
                <input id="p-price" type="number" placeholder="ex: 85000" class="w-full bg-black p-4 rounded-2xl border border-white/10 outline-none focus:border-orange-500 text-orange-500 font-black">
            </div>

            <div>
                <label class="text-[10px] font-black text-gray-500 uppercase ml-2">Lien Photo (URL)</label>
                <input id="p-img" type="text" placeholder="Colle le lien de l'image ici" class="w-full bg-black p-4 rounded-2xl border border-white/10 outline-none focus:border-orange-500 text-xs">
            </div>

            <div class="grid grid-cols-2 gap-2">
                <div>
                    <label class="text-[10px] font-black text-gray-500 uppercase ml-2">Catégorie</label>
                    <select id="p-type" class="w-full bg-black p-4 rounded-2xl border border-white/10 outline-none text-xs font-bold">
                        <option value="vetement">👕 Vêtement</option>
                        <option value="chaussure">👟 Chaussure</option>
                        <option value="accessoire">✨ Accessoire</option>
                    </select>
                </div>
                <div>
                    <label class="text-[10px] font-black text-gray-500 uppercase ml-2">Boutique</label>
                    <input id="p-shop" type="text" placeholder="Nom boutique" class="w-full bg-black p-4 rounded-2xl border border-white/10 outline-none text-xs">
                </div>
            </div>

            <div>
                <label class="text-[10px] font-black text-gray-500 uppercase ml-2">Localisation Fournisseur</label>
                <button type="button" id="gps-btn" onclick="getShopGPS()" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl text-[10px] font-black text-orange-500 uppercase tracking-widest transition-all active:scale-95">
                    📍 Capturer GPS Boutique
                </button>
                <input type="hidden" id="p-shop-gps">
            </div>

            <div>
                <label class="text-[10px] font-black text-gray-500 uppercase ml-2">Tailles / Pointures (ex: S,M,L ou 40,41)</label>
                <input id="p-sizes" type="text" placeholder="S, M, L, XL" class="w-full bg-black p-4 rounded-2xl border border-white/10 outline-none focus:border-orange-500 font-bold">
            </div>

            <button type="button" onclick="addProduct()" class="w-full bg-orange-500 text-black py-5 rounded-[2rem] font-black uppercase italic shadow-lg active:scale-95 transition mt-4">
                Ajouter au catalogue 🚀
            </button>
        </form>
    </div>
</body>
</html>
