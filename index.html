<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DRIPRUSH - Premium Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, push, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBuzgGc5iumNCurtTpVM5X3_3TK95qbQpc",
            authDomain: "vroomiam.firebaseapp.com",
            databaseURL: "https://vroomiam-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "vroomiam",
            storageBucket: "vroomiam.firebasestorage.app",
            messagingSenderId: "13433812189",
            appId: "1:13433812189:web:40b8ba4b14cb0a4deb9734"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let cart = [];
        let selectedItem = null;
        let deliveryFee = 0;

        // 1. CHARGEMENT PRODUITS
        onValue(ref(db, 'driprush_products'), (snapshot) => {
            const data = snapshot.val();
            const grid = document.getElementById('products-grid');
            grid.innerHTML = '';
            if (data) {
                Object.keys(data).reverse().forEach(id => {
                    const p = data[id];
                    grid.innerHTML += `
                        <div onclick="openModal('${id}', '${p.name}', '${p.price}', '${p.image}', '${p.sizes}', '${p.shop}', '${p.shopGPS || ''}')" class="bg-gray-900 rounded-[2rem] p-2 border border-white/5 active:scale-95 transition">
                            <img src="${p.image}" class="w-full h-40 object-cover rounded-[1.5rem] mb-2 shadow-lg">
                            <div class="px-1">
                                <h3 class="text-white font-bold text-[10px] truncate uppercase italic">${p.name}</h3>
                                <div class="flex justify-between items-center mt-1">
                                    <span class="text-orange-500 font-black text-[11px]">${parseInt(p.price).toLocaleString()} F</span>
                                    <span class="bg-white/10 p-1.5 rounded-lg text-[8px]">➕</span>
                                </div>
                            </div>
                        </div>
                    `;
                });
            }
        });

        window.openModal = (id, name, price, image, sizes, shop, shopGPS) => {
            selectedItem = { id, name, price, image, shop, shopGPS };
            document.getElementById('modal-img').src = image;
            document.getElementById('modal-name').innerText = name;
            document.getElementById('modal-price').innerText = parseInt(price).toLocaleString() + " F";
            const container = document.getElementById('size-container');
            container.innerHTML = '';
            if(sizes) {
                sizes.split(',').forEach(s => {
                    container.innerHTML += `<button onclick="selectSize('${s.trim()}')" class="size-btn border border-white/10 px-4 py-2 rounded-xl text-[9px] font-black text-white uppercase transition">${s.trim()}</button>`;
                });
            }
            document.getElementById('product-modal').classList.remove('hidden');
        };

        window.selectSize = (size) => {
            selectedItem.size = size;
            document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('bg-orange-500', 'text-black', 'border-orange-500'));
            event.target.classList.add('bg-orange-500', 'text-black', 'border-orange-500');
        };

        window.addToCart = () => {
            if(!selectedItem.size) return alert("Choisis une taille !");
            cart.push({...selectedItem});
            updateCartUI();
            document.getElementById('product-modal').classList.add('hidden');
        };

        const updateCartUI = () => {
            document.getElementById('cart-count').innerText = cart.length;
            // Affiche la barre seulement si panier non vide ET checkout fermé
            const isCheckoutHidden = document.getElementById('checkout-modal').classList.contains('hidden');
            document.getElementById('cart-bar').classList.toggle('hidden', cart.length === 0 || !isCheckoutHidden);
            let total = 0; cart.forEach(i => total += parseInt(i.price));
            document.getElementById('cart-total').innerText = total.toLocaleString() + " F";
        };

        window.setShipping = (fee) => {
            deliveryFee = fee;
            let subtotal = 0; cart.forEach(i => subtotal += parseInt(i.price));
            document.getElementById('final-total-display').innerText = (subtotal + fee).toLocaleString() + " F";
            document.querySelectorAll('.ship-btn').forEach(b => b.classList.remove('border-orange-500', 'text-orange-500', 'bg-orange-500/10'));
            event.target.classList.add('border-orange-500', 'text-orange-500', 'bg-orange-500/10');
        };

        window.confirmOrder = () => {
            const name = document.getElementById('c-name').value;
            const phone = document.getElementById('c-phone').value;
            const addr = document.getElementById('c-addr').value;
            if(!name || !phone || !addr || deliveryFee === 0) return alert("Infos manquantes !");

            navigator.geolocation.getCurrentPosition((pos) => {
                const gps = `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
                saveOrder(name, phone, addr, gps);
            }, () => saveOrder(name, phone, addr, "GPS Refusé"));
        };

        const saveOrder = (name, phone, addr, gps) => {
            let subtotal = 0; cart.forEach(i => subtotal += parseInt(i.price));
            const orderRef = push(ref(db, 'driprush_orders'));
            set(orderRef, {
                clientName: name, phone, address: addr, clientGPS: gps,
                items: cart.map(i => `${i.name} [${i.size}]`).join(', '),
                total: subtotal + deliveryFee,
                shopName: cart.shop, shopGPS: cart.shopGPS || "",
                status: 'Attente Dépôt', timestamp: Date.now()
            });
            alert("Commande envoyée ! 🔥");
            cart = []; updateCartUI();
            document.getElementById('checkout-modal').classList.add('hidden');
        };

        // Gérer la visibilité de la barre de panier lors de l'ouverture du checkout
        window.toggleCheckout = (show) => {
            document.getElementById('checkout-modal').classList.toggle('hidden', !show);
            updateCartUI(); 
        };
    </script>
</head>
<body class="bg-[#050505] text-white p-4 font-sans selection:bg-orange-500">

    <header class="flex justify-between items-center mb-6 sticky top-0 bg-[#050505]/90 backdrop-blur-md py-4 z-40">
        <div>
            <h1 class="text-3xl font-black italic tracking-tighter text-orange-500 uppercase">DRIPRUSH</h1>
            <p class="text-[8px] text-gray-500 font-bold uppercase tracking-[0.2em]">Premium Delivery</p>
        </div>
        <div class="relative bg-gray-900 p-3 rounded-2xl border border-white/5">
            <span class="text-lg">🛍️</span>
            <span id="cart-count" class="absolute -top-1 -right-1 bg-orange-500 text-black text-[9px] font-black w-4 h-4 flex items-center justify-center rounded-full">0</span>
        </div>
    </header>

    <div id="products-grid" class="grid grid-cols-2 gap-3 pb-28"></div>

    <div id="cart-bar" class="fixed bottom-6 left-4 right-4 bg-white text-black p-4 rounded-[1.8rem] flex justify-between items-center hidden shadow-2xl z-40 animate-bounce-in">
        <div>
            <p class="text-[8px] font-black uppercase opacity-40">Total</p>
            <p id="cart-total" class="text-lg font-black italic tracking-tighter">0 F</p>
        </div>
        <button onclick="toggleCheckout(true)" class="bg-black text-white px-8 py-3 rounded-xl font-black uppercase text-[9px] italic">Valider 🚀</button>
    </div>

    <div id="product-modal" class="fixed inset-0 bg-black/95 backdrop-blur-md z-50 flex items-end hidden">
        <div class="w-full bg-gray-950 rounded-t-[3rem] p-6 border-t border-white/10 space-y-6">
            <div class="flex flex-col items-center">
                <a id="modal-link" href="#" target="_blank" class="w-full">
                    <img id="modal-img" src="" class="w-full h-64 object-cover rounded-[2rem] border border-white/10 shadow-2xl mb-4">
                </a>
                <div class="text-center">
                    <h2 id="modal-name" class="text-xl font-black italic uppercase text-white leading-tight"></h2>
                    <p id="modal-price" class="text-2xl font-black text-orange-500 mt-1"></p>
                </div>
            </div>
            <div>
                <p class="text-[9px] font-black text-gray-500 uppercase mb-3">Taille / Pointure</p>
                <div id="size-container" class="flex flex-wrap gap-2"></div>
            </div>
            <button onclick="addToCart()" class="w-full bg-orange-500 text-black py-4 rounded-[1.5rem] font-black uppercase italic shadow-lg active:scale-95 transition">Ajouter au panier</button>
            <button onclick="document.getElementById('product-modal').classList.add('hidden')" class="w-full text-gray-600 font-bold py-1 text-[9px] uppercase tracking-widest">Annuler</button>
        </div>
    </div>

    <div id="checkout-modal" class="fixed inset-0 bg-black z-50 p-4 flex items-center justify-center hidden">
        <div class="w-full max-w-sm bg-gray-900 p-6 rounded-[2.5rem] border border-white/10 space-y-4 overflow-y-auto max-h-[90vh]">
            <h2 class="text-xl font-black italic uppercase text-center text-orange-500">Dernière étape</h2>
            
            <div class="grid grid-cols-2 gap-2">
                <button onclick="setShipping(500)" class="ship-btn bg-black border border-white/5 p-3 rounded-xl text-[8px] font-black uppercase transition">🚲 Standard (+500)</button>
                <button onclick="setShipping(800)" class="ship-btn bg-black border border-white/5 p-3 rounded-xl text-[8px] font-black uppercase transition">🚀 Express (+800)</button>
            </div>

            <div class="bg-orange-500 p-4 rounded-2xl text-center">
                <p id="final-total-display" class="text-2xl font-black text-black italic">Choisir livraison</p>
            </div>

            <div class="space-y-2">
                <input id="c-name" placeholder="Nom Complet" class="w-full bg-black p-3.5 rounded-xl border border-white/5 outline-none text-sm font-bold">
                <input id="c-phone" placeholder="WhatsApp (ex: 229...)" class="w-full bg-black p-3.5 rounded-xl border border-white/5 outline-none text-sm font-bold">
                <textarea id="c-addr" placeholder="Adresse de livraison" class="w-full bg-black p-3.5 rounded-xl border border-white/5 outline-none text-sm font-bold h-16"></textarea>
            </div>

            <button onclick="confirmOrder()" class="w-full bg-white text-black py-4 rounded-[1.5rem] font-black uppercase italic active:scale-95 transition text-xs">Confirmer & Payer ✅</button>
            <button onclick="toggleCheckout(false)" class="w-full text-gray-600 font-bold py-1 text-[9px] uppercase">Retourner à la boutique</button>
        </div>
    </div>

</body>
</html>
