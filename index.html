        import { getDatabase, ref, onValue, push, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBuzgGc5iumNCurtTpVM5X3_3TK95qbQpc",
            authDomain: "vroomiam.firebaseapp.com",
            databaseURL: "https://vroomiam-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "vroomiam",
            storageBucket: "vroomiam.firebasestorage.app",
            messagingSenderId: "13433812189",
            appId: "1:13433812189:web:40b8ba4b14cb0a4deb9734"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let cart = [];
        let selectedItem = null;
        let deliveryFee = 0;
        let deliveryTypeSelected = ""; 
        let allProducts = [];

        // ... [Garde tes fonctions existantes : enterSite, submitPartner, renderProducts, etc.] ...

        // CORRECTION DE LA LOGIQUE D'AJOUT AU PANIER (Vérification boutique)
        window.addToCart = () => {
            if(!selectedItem || !selectedItem.size) return alert("Sélectionne une taille d'abord !");
            
            if (cart.length > 0) {
                // On compare avec le premier article du panier pour vérifier la boutique
                if (cart.shopPhone !== selectedItem.shopPhone) {
                    alert("Tu ne peux pas mélanger des produits de boutiques différentes !");
                    return;
                }
            }

            cart.push({...selectedItem, validated: false});
            window.updateCartUI();
            document.getElementById('product-modal').classList.add('hidden');
        };

        // CORRECTION DE LA MISE À JOUR DU PANIER
        window.updateCartUI = () => {
            document.getElementById('nav-cart-count').innerText = cart.length;
            
            if(cart.length > 0) {
                const first = cart; // On utilise le premier article comme référence
                document.getElementById('lbl-std').innerText = `🚲 Normale (+${first.deliveryStandard || 0} F)`;
                document.getElementById('lbl-exp').innerText = `🚀 Rapide (+${first.deliveryExpress || 0} F)`;
            }
            // ... [Reste de ta logique d'affichage du panier] ...
        };

        // CORRECTION DE LA SAUVEGARDE COMMANDE
        window.saveAutomatedOrder = (name, phone, addr, gps, finalTotal, pendingItems) => {
            const firstItem = pendingItems; // Utilisation correcte du premier index
            const orderRef = push(ref(db, 'driprush_orders'));

            set(orderRef, {
                clientName: name, phone, address: addr, clientGPS: gps,
                shopName: firstItem.shop || 'Driprush',
                shopPhone: firstItem.shopPhone || '2290147535343',
                items: pendingItems.map(i => `${i.name} [${i.size}]`).join(', '),
                deliveryMode: deliveryTypeSelected,
                total: finalTotal,
                status: 'Payée',
                timestamp: Date.now()
            }).then(() => {
                // ... [Logique WhatsApp] ...
                cart = []; 
                window.updateCartUI();
                document.getElementById('checkout-modal').classList.add('hidden');
            });
        };
