<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DRIPRUSH - Premium Store</title>

    <meta property="og:type" content="website">
    <meta property="og:url" content="https://vroomiam.web.app/">
    <meta property="og:title" content="DRIPRUSH - Premium Store">
    <meta property="og:description" content="Livraison en 15min chrono au Bénin. Qualité premium uniquement. 🔥">
    <meta property="og:image" content="https://i.ibb.co/b58wJF0B/IMG-3395.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.fedapay.com/checkout.js?v=1.1.7"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8f8f8; color: #1a1a1a; overflow-x: hidden; }
        .active-cat { background-color: #000 !important; color: #fff !important; transform: scale(1.05); }
        .product-card { transition: all 0.3s ease; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .animate-slide-up { animation: slideUp 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .animate-fade-in { animation: fadeIn 0.2s ease-out; }
        .modal-height-fix { max-height: 90vh; overflow-y: auto; }
    </style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, push, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBuzgGc5iumNCurtTpVM5X3_3TK95qbQpc",
            authDomain: "vroomiam.firebaseapp.com",
            databaseURL: "https://vroomiam-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "vroomiam",
            storageBucket: "vroomiam.firebasestorage.app",
            messagingSenderId: "13433812189",
            appId: "1:13433812189:web:40b8ba4b14cb0a4deb9734"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.cart = [];
        window.selectedItem = null;
        window.deliveryFee = 0;
        window.deliveryTypeSelected = "";
        window.allProducts = [];

        onValue(ref(db, 'driprush_products'), (snapshot) => {
            const data = snapshot.val();
            window.allProducts = data ? Object.keys(data).map(id => ({ id, ...data[id] })).reverse() : [];
            window.renderProducts(window.allProducts);
        });

        window.enterSite = (mode) => {
            if(mode === 'shop') {
                document.getElementById('welcome-screen').classList.add('hidden');
                document.getElementById('main-content').classList.remove('hidden');
            } else if(mode === 'partner') {
                document.getElementById('partner-modal').classList.remove('hidden');
            }
        };

        window.submitPartner = () => {
            const name = document.getElementById('p-name').value;
            const phone = document.getElementById('p-phone').value;
            const loc = document.getElementById('p-loc').value;
            if(!name || !phone || !loc) return alert("Remplissez tous les champs !");
            const message = `Salut DRIPRUSH ! 🔥\n\nNOUVELLE BOUTIQUE PARTENAIRE :\n🏪 Nom: ${name}\n📞 Contact: ${phone}\n📍 Localisation: ${loc}`;
            window.open(`https://wa.me/2290147535343?text=${encodeURIComponent(message)}`, '_blank');
            document.getElementById('partner-modal').classList.add('hidden');
        };

        window.renderProducts = (products) => {
            const grid = document.getElementById('products-grid');
            if(!grid) return;
            grid.innerHTML = '';
            products.forEach(p => {
                const pShopName = p.shopName || "Driprush";
                const pShopPhone = p.shopPhone || "2290147535343";
                grid.innerHTML += `
                    <div class="product-card bg-white rounded-2xl overflow-hidden shadow-sm relative border border-gray-50 active:scale-95 transition cursor-pointer" onclick="window.openModal('${p.id}', '${(p.name||'').replace(/'/g, "\\'")}', '${p.price}', '${p.image}', '${(p.sizes||'').replace(/'/g, "\\'")}', '${pShopName.replace(/'/g, "\\'")}', '${(p.shopGPS||'').replace(/'/g, "\\'")}', '${pShopPhone}', ${p.deliveryStandard || 0}, ${p.deliveryExpress || 0})">
                        <img src="${p.image}" class="w-full h-52 object-cover" loading="lazy">
                        <div class="p-3">
                            <p class="text-[9px] text-gray-400 font-black uppercase mb-1">${pShopName}</p>
                            <h3 class="text-[11px] font-bold text-gray-800 leading-tight h-8 line-clamp-2 uppercase">${p.name}</h3>
                            <div class="mt-3 flex items-center justify-between">
                                <span class="text-[13px] font-black text-black">${parseInt(p.price).toLocaleString()} F</span>
                                <div class="bg-black text-white w-7 h-7 rounded-full flex items-center justify-center">
                                    <i class="fa-solid fa-plus text-[10px]"></i>
                                </div>
                            </div>
                        </div>
                    </div>`;
            });
        };

        window.openModal = (id, name, price, image, sizes, shop, shopGPS, shopPhone, deliveryStandard, deliveryExpress) => {
            window.selectedItem = { id, name, price, image, shop, shopGPS, shopPhone, deliveryStandard, deliveryExpress, size: null };
            document.getElementById('modal-img').src = image;
            document.getElementById('modal-name').innerText = name;
            document.getElementById('modal-price').innerText = parseInt(price).toLocaleString() + " F";
            const container = document.getElementById('size-container');
            container.innerHTML = '';
            if(sizes && sizes !== "N/A" && sizes.trim() !== "") {
                sizes.split(',').forEach((s, idx) => {
                    const size = s.trim();
                    if(idx === 0) window.selectedItem.size = size;
                    container.innerHTML += `<button onclick="window.selectSize(this, '${size}')" class="size-btn border border-gray-200 px-4 py-2 rounded-xl text-[10px] font-bold uppercase transition ${idx === 0 ? 'bg-black text-white border-black' : ''}">${size}</button>`;
                });
            } else {
                window.selectedItem.size = "Unique";
                container.innerHTML = `<button class="bg-black text-white border-black border px-4 py-2 rounded-xl text-[10px] font-bold uppercase">Taille Unique</button>`;
            }
            document.getElementById('product-modal').classList.remove('hidden');
        };

        window.selectSize = (element, size) => {
            window.selectedItem.size = size;
            document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('bg-black', 'text-white', 'border-black'));
            element.classList.add('bg-black', 'text-white', 'border-black');
        };

        window.addToCart = () => {
            if(!window.selectedItem.size) return alert("Sélectionne une taille !");
            if (window.cart.length > 0 && window.cart.shopPhone !== window.selectedItem.shopPhone) {
                return alert("Tu ne peux pas mélanger des produits de boutiques différentes !");
            }
            window.cart.push({...window.selectedItem, validated: false});
            window.updateCartUI();
            document.getElementById('product-modal').classList.add('hidden');
        };

        window.updateCartUI = () => {
            document.getElementById('nav-cart-count').innerText = window.cart.length;
            const listContainer = document.getElementById('cart-items-list');
            listContainer.innerHTML = '';
            let subtotal = 0;
            window.cart.forEach((item, index) => {
                if(!item.validated) subtotal += parseInt(item.price);
                listContainer.innerHTML += `
                    <div class="flex items-center gap-3 bg-gray-50 p-3 rounded-2xl mb-2">
                        <img src="${item.image}" class="w-12 h-12 object-cover rounded-lg">
                        <div class="flex-1"><p class="text-[10px] font-bold">${item.name} (${item.size})</p><p class="text-[11px] font-black">${parseInt(item.price).toLocaleString()} F</p></div>
                        <button onclick="window.removeFromCart(${index})" class="text-red-500"><i class="fa-solid fa-trash-can"></i></button>
                    </div>`;
            });
            document.getElementById('cart-total').innerText = subtotal.toLocaleString() + " F";
            
            if(window.cart.length > 0) {
                const first = window.cart;
                document.getElementById('lbl-std').innerText = `🚲 Normale (+${first.deliveryStandard || 0} F)`;
                document.getElementById('lbl-exp').innerText = `🚀 Rapide (+${first.deliveryExpress || 0} F)`;
            }
        };

        window.removeFromCart = (index) => {
            window.cart.splice(index, 1);
            window.updateCartUI();
        };

        window.setShipping = (type, element) => {
            if(window.cart.length === 0) return;
            window.deliveryTypeSelected = type;
            const first = window.cart;
            window.deliveryFee = type === "standard" ? first.deliveryStandard : first.deliveryExpress;
            document.querySelectorAll('.ship-btn').forEach(b => b.classList.remove('bg-black', 'text-white'));
            element.classList.add('bg-black', 'text-white');
            document.getElementById('final-total-display').innerText = (window.cart.reduce((acc, i) => acc + parseInt(i.price), 0) + window.deliveryFee).toLocaleString() + " F";
        };

        window.confirmOrder = (element) => {
            const name = document.getElementById('c-name').value;
            const phone = document.getElementById('c-phone').value;
            const addr = document.getElementById('c-addr').value;
            if(!name || !phone || !addr || window.deliveryFee === 0) return alert("Infos ou livraison manquantes !");
            
            const firstItem = window.cart;
            const orderRef = push(ref(db, 'driprush_orders'));
            set(orderRef, {
                clientName: name, phone, address: addr,
                shopName: firstItem.shop, shopPhone: firstItem.shopPhone,
                items: window.cart.map(i => `${i.name} [${i.size}]`).join(', '),
                deliveryMode: window.deliveryTypeSelected,
                total: window.cart.reduce((acc, i) => acc + parseInt(i.price), 0) + window.deliveryFee,
                status: 'Payée',
                timestamp: Date.now()
            }).then(() => {
                alert("Commande enregistrée !");
                window.location.reload();
            });
        };
        
        window.toggleCheckout = (show) => document.getElementById('checkout-modal').classList.toggle('hidden', !show);
        window.closeModalOutside = (e) => { if(e.target.id === 'product-modal') document.getElementById('product-modal').classList.add('hidden'); };
    </script>
</head>
<body class="pb-24">
    <div id="welcome-screen" class="fixed inset-0 z-50 bg-black flex flex-col items-center justify-end pb-20 px-6 text-center">
        <h1 class="text-6xl font-black italic text-white mb-2 tracking-tighter uppercase">DRIPRUSH</h1>
        <button onclick="window.enterSite('shop')" class="w-full bg-white text-black py-5 rounded-2xl font-black uppercase italic text-sm">Démarrer le Shopping 🛍️</button>
    </div>
    
    <div id="main-content" class="hidden">
        <header class="bg-white px-4 pt-4 pb-2 sticky top-0 z-40 shadow-sm">
            <div class="flex justify-between items-center mb-4">
                <h1 class="text-2xl font-black italic tracking-tighter text-black uppercase">DRIPRUSH</h1>
                <div onclick="window.toggleCheckout(true)" class="relative cursor-pointer">
                    <i class="fa-solid fa-bag-shopping"></i>
                    <span id="nav-cart-count" class="absolute -top-2 -right-2 bg-orange-500 text-white text-[10px] font-bold px-1.5 rounded-full">0</span>
                </div>
            </div>
        </header>
        <main class="p-3"><div id="products-grid" class="grid grid-cols-2 gap-3"></div></main>
        
        <div id="product-modal" onclick="window.closeModalOutside(event)" class="fixed inset-0 bg-black/70 z-50 flex items-end hidden">
            <div class="w-full bg-white rounded-t-[2.5rem] p-6 space-y-6">
                <img id="modal-img" src="" class="w-full h-60 object-cover rounded-2xl">
                <h2 id="modal-name" class="text-xl font-black uppercase"></h2>
                <p id="modal-price" class="text-lg font-bold"></p>
                <div id="size-container" class="flex flex-wrap gap-2"></div>
                <button onclick="window.addToCart()" class="w-full bg-black text-white py-5 rounded-2xl font-black">Ajouter au panier 🛍️</button>
            </div>
        </div>

        <div id="checkout-modal" class="fixed inset-0 bg-white z-50 p-4 hidden">
            <button onclick="window.toggleCheckout(false)">Retour</button>
            <div id="cart-items-list"></div>
            <div id="cart-total"></div>
            <button onclick="window.setShipping('standard', this)" class="ship-btn" id="lbl-std">🚲 Normale</button>
            <button onclick="window.setShipping('express', this)" class="ship-btn" id="lbl-exp">🚀 Rapide</button>
            <div id="final-total-display"></div>
            <input id="c-name" placeholder="NOM">
            <input id="c-phone" placeholder="TÉLÉPHONE">
            <textarea id="c-addr" placeholder="ADRESSE"></textarea>
            <button onclick="window.confirmOrder(this)" class="bg-black text-white py-4">Confirmer ✅</button>
        </div>
    </div>

    <div id="partner-modal" class="fixed inset-0 bg-black/80 z-50 flex items-center justify-center hidden p-4">
        <div class="bg-white p-6 rounded-3xl w-full max-w-sm">
            <input id="p-name" placeholder="NOM">
            <input id="p-phone" placeholder="TÉLÉPHONE">
            <input id="p-loc" placeholder="LOCALISATION">
            <button onclick="window.submitPartner()">Soumettre</button>
        </div>
    </div>
</body>
</html>
