<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DRIPRUSH - Premium Store</title>

    <meta property="og:type" content="website">
    <meta property="og:url" content="https://vroomiam.web.app/">
    <meta property="og:title" content="DRIPRUSH - Premium Store">
    <meta property="og:description" content="Livraison en 15min chrono au Bénin. Qualité premium uniquement. 🔥">
    <meta property="og:image" content="https://i.ibb.co/b58wJF0B/IMG-3395.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght=400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8f8f8; color: #1a1a1a; overflow-x: hidden; }
        .active-cat { background-color: #000 !important; color: #fff !important; transform: scale(1.05); }
        .product-card { transition: all 0.3s ease; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
        .animate-marquee { display: inline-block; animation: marquee 20s linear infinite; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .animate-slide-up { animation: slideUp 0.3s ease-out; }
        .modal-height-fix { max-height: 90vh; overflow-y: auto; }
        @keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }
        .cart-pop { animation: pop 0.3s ease-in-out; }
    </style>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, push, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBuzgGc5iumNCurtTpVM5X3_3TK95qbQpc",
            authDomain: "vroomiam.firebaseapp.com",
            databaseURL: "https://vroomiam-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "vroomiam",
            storageBucket: "vroomiam.firebasestorage.app",
            messagingSenderId: "13433812189",
            appId: "1:13433812189:web:40b8ba4b14cb0a4deb9734"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let cart = [];
        let selectedItem = null;
        let deliveryFee = 0;
        let deliveryTypeSelected = ""; // "standard" ou "express"
        let allProducts = [];

        onValue(ref(db, 'driprush_products'), (snapshot) => {
            const data = snapshot.val();
            allProducts = []; 
            if (data) {
                allProducts = Object.keys(data).map(id => ({ id, ...data[id] })).reverse();
                renderProducts(allProducts);
            }
        });

        window.enterSite = (mode) => {
            if(mode === 'shop') {
                document.getElementById('welcome-screen').classList.add('hidden');
                document.getElementById('main-content').classList.remove('hidden');
            } else if(mode === 'partner') {
                document.getElementById('partner-modal').classList.remove('hidden');
            }
        };

        window.submitPartner = () => {
            const name = document.getElementById('p-name').value;
            const phone = document.getElementById('p-phone').value;
            const loc = document.getElementById('p-loc').value;
            if(!name || !phone || !loc) return alert("Remplissez tous les champs !");
            const message = `Salut DRIPRUSH ! 🔥\n\nNOUVELLE BOUTIQUE PARTENAIRE :\n🏪 Nom: ${name}\n📞 Contact: ${phone}\n📍 Localisation: ${loc}`;
            window.open(`https://wa.me/2290147535343?text=${encodeURIComponent(message)}`, '_blank');
            document.getElementById('partner-modal').classList.add('hidden');
        };

        window.renderProducts = (products) => {
            const grid = document.getElementById('products-grid');
            grid.innerHTML = '';
            products.forEach(p => {
                const safeName = (p.name || "").replace(/'/g, "\\'");
                const safeShop = (p.shopName || 'Driprush').replace(/'/g, "\\'");
                const safeGPS = (p.shopGPS || '').replace(/'/g, "\\'");

                // Passage des nouveaux tarifs de livraison au modal produit lors du clic
                grid.innerHTML += `
                    <div class="product-card bg-white rounded-2xl overflow-hidden shadow-sm relative border border-gray-50 active:scale-95 transition" onclick="openModal('${p.id}', '${safeName}', '${p.price}', '${p.image}', '${p.sizes || ''}', '${safeShop}', '${safeGPS}', '${p.shopPhone || ''}', ${p.deliveryStandard || 0}, ${p.deliveryExpress || 0})">
                        <button class="absolute top-3 right-3 z-10 text-gray-300 hover:text-red-500 transition" onclick="event.stopPropagation(); this.classList.toggle('text-red-500')">
                            <i class="fa-solid fa-heart text-lg"></i>
                        </button>
                        <img src="${p.image}" class="w-full h-52 object-cover" loading="lazy">
                        <div class="p-3">
                            <p class="text-[9px] text-gray-400 font-black uppercase mb-1">${p.shopName || 'Driprush'}</p>
                            <h3 class="text-[11px] font-bold text-gray-800 leading-tight h-8 line-clamp-2 uppercase">${p.name}</h3>
                            <div class="mt-3 flex items-center justify-between">
                                <span class="text-[13px] font-black text-black">${parseInt(p.price).toLocaleString()} F</span>
                                <div class="bg-black text-white w-7 h-7 rounded-full flex items-center justify-center">
                                    <i class="fa-solid fa-plus text-[10px]"></i>
                                </div>
                            </div>
                        </div>
                    </div>`;
            });
            if(products.length === 0) {
                grid.innerHTML = '<div class="col-span-2 text-center py-20 text-gray-400 font-bold italic uppercase text-xs">Aucun article trouvé...</div>';
            }
        };

        window.filterByGenre = (genre) => {
            document.querySelectorAll('.cat-btn').forEach(btn => btn.classList.remove('active-cat'));
            document.getElementById(`btn-${genre}`).classList.add('active-cat');
            if (genre === 'tout') { renderProducts(allProducts); } 
            else { renderProducts(allProducts.filter(p => p.genre && p.genre.toLowerCase() === genre.toLowerCase())); }
        };

        window.searchProducts = (query) => {
            renderProducts(allProducts.filter(p => p.name.toLowerCase().includes(query.toLowerCase().trim())));
        };

        window.openModal = (id, name, price, image, sizes, shop, shopGPS, shopPhone, deliveryStandard, deliveryExpress) => {
            selectedItem = { id, name, price, image, shop, shopGPS, shopPhone, deliveryStandard, deliveryExpress };
            document.getElementById('modal-img').src = image;
            document.getElementById('modal-name').innerText = name;
            document.getElementById('modal-price').innerText = parseInt(price).toLocaleString() + " F";
            const container = document.getElementById('size-container');
            container.innerHTML = '';
            if(sizes && sizes !== "N/A") {
                sizes.split(',').forEach(s => {
                    container.innerHTML += `<button onclick="selectSize('${s.trim()}')" class="size-btn border border-gray-200 px-4 py-2 rounded-xl text-[10px] font-bold uppercase transition hover:border-black">${s.trim()}</button>`;
                });
            } else {
                container.innerHTML = `<button onclick="selectSize('Unique')" class="size-btn border border-gray-200 px-4 py-2 rounded-xl text-[10px] font-bold uppercase transition hover:border-black">Taille Unique</button>`;
            }
            document.getElementById('product-modal').classList.remove('hidden');
        };

        window.selectSize = (size) => {
            selectedItem.size = size;
            document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('bg-black', 'text-white', 'border-black'));
            event.target.classList.add('bg-black', 'text-white', 'border-black');
        };

        window.addToCart = () => {
            if(!selectedItem.size) return alert("Choisis une taille !");
            
            if (cart.length > 0 && cart[0].shopPhone !== selectedItem.shopPhone) {
                alert(`Pour des raisons de logistique, tu ne peux pas commander chez "${selectedItem.shop}" et "${cart[0].shop}" en même temps. Finalise ton panier actuel d'abord !`);
                return;
            }

            cart.push({...selectedItem, validated: false});
            // Réinitialise le choix de livraison quand le panier change
            deliveryFee = 0;
            deliveryTypeSelected = "";
            updateCartUI();
            
            document.getElementById('product-modal').classList.add('hidden');
        };

        const updateCartUI = () => {
            document.getElementById('cart-count').innerText = cart.length;
            document.getElementById('nav-cart-count').innerText = cart.length;
            const isCheckoutHidden = document.getElementById('checkout-modal').classList.contains('hidden');
            const hasPending = cart.some(i => !i.validated);
            document.getElementById('cart-bar').classList.toggle('hidden', !hasPending || !isCheckoutHidden);
            
            let subtotal = 0; 
            const listContainer = document.getElementById('cart-items-list');
            listContainer.innerHTML = '';

            cart.forEach((item, index) => {
                if(!item.validated) subtotal += parseInt(item.price);
                listContainer.innerHTML += `
                    <div class="flex items-center gap-3 bg-gray-50 p-3 rounded-2xl border border-gray-100 mb-2">
                        <img src="${item.image}" class="w-12 h-12 object-cover rounded-lg">
                        <div class="flex-1">
                            <p class="text-[10px] font-bold uppercase">${item.name} (${item.size})</p>
                            <p class="text-black text-[11px] font-black">${parseInt(item.price).toLocaleString()} F</p>
                        </div>
                        ${item.validated ? 
                            '<span class="text-[7px] font-black text-green-500 bg-green-500/10 px-2 py-1 rounded-full uppercase">Validée</span>' : 
                            `<button onclick="removeFromCart(${index})" class="text-red-500 text-xs px-2"><i class="fa-solid fa-trash-can"></i></button>`
                        }
                    </div>`;
            });
            document.getElementById('cart-total').innerText = subtotal.toLocaleString() + " F";

            // Mise à jour de l'affichage des boutons de livraison basés sur la boutique propriétaire de l'article du panier
            if(cart.length > 0) {
                const first = cart[0];
                document.getElementById('lbl-std').innerText = `🚲 Normale (+${first.deliveryStandard} F)`;
                document.getElementById('lbl-exp').innerText = `🚀 Rapide (+${first.deliveryExpress} F)`;
                
                if(deliveryTypeSelected === "standard") deliveryFee = first.deliveryStandard;
                else if(deliveryTypeSelected === "express") deliveryFee = first.deliveryExpress;
            }

            const totalDisplay = document.getElementById('final-total-display');
            if(deliveryFee > 0) {
                totalDisplay.innerText = (subtotal + deliveryFee).toLocaleString() + " F";
            } else {
                totalDisplay.innerText = "Choisir livraison";
            }
        };

        window.removeFromCart = (index) => {
            cart.splice(index, 1);
            deliveryFee = 0;
            deliveryTypeSelected = "";
            updateCartUI();
        };

        window.setShipping = (type) => {
            if(cart.length === 0) return;
            deliveryTypeSelected = type;
            
            document.querySelectorAll('.ship-btn').forEach(b => b.classList.remove('bg-black', 'text-white'));
            event.target.classList.add('bg-black', 'text-white');
            
            updateCartUI();
        };

        window.confirmOrder = () => {
            const name = document.getElementById('c-name').value;
            const phone = document.getElementById('c-phone').value;
            const addr = document.getElementById('c-addr').value;
            const pendingItems = cart.filter(i => !i.validated);

            if(pendingItems.length === 0) return alert("Aucun article à commander !");
            if(!name || !phone || !addr || deliveryFee === 0) return alert("Infos manquantes ou mode de livraison non choisi !");

            const btn = event.target;
            const originalText = btn.innerText;
            btn.innerText = "CONNEXION GPS... ⏳";
            btn.disabled = true;

            navigator.geolocation.getCurrentPosition((pos) => {
                const gps = `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
                saveOrder(name, phone, addr, gps, btn, originalText);
            }, () => {
                saveOrder(name, phone, addr, "GPS Refusé", btn, originalText);
            }, { timeout: 8000 });
        };

        const saveOrder = (name, phone, addr, gps, btn, originalText) => {
            const pendingItems = cart.filter(i => !i.validated);
            let subtotal = 0; 
            pendingItems.forEach(i => subtotal += parseInt(i.price));

            const firstItem = pendingItems[0]; 
            const finalTotal = subtotal + deliveryFee;

            const orderRef = push(ref(db, 'driprush_orders'));
            set(orderRef, {
                clientName: name, 
                phone: phone, 
                address: addr, 
                clientGPS: gps,
                shopName: firstItem.shop || "Driprush",
                shopGPS: firstItem.shopGPS || "Non renseigné",
                shopPhone: firstItem.shopPhone || "",
                items: pendingItems.map(i => `${i.name} [${i.size}]`).join(', '),
                deliveryMode: deliveryTypeSelected,
                total: finalTotal,
                status: 'Attente de paiement',
                timestamp: Date.now()
            }).then(() => {
                alert("🔥 Commande enregistrée ! Redirection vers le paiement FedaPay...");
                cart.forEach(item => { if(!item.validated) item.validated = true; });
                updateCartUI();
                document.getElementById('checkout-modal').classList.add('hidden');
            }).catch(() => {
                alert("Erreur réseau.");
            }).finally(() => {
                btn.innerText = originalText;
                btn.disabled = false;
            });
        };

        window.toggleCheckout = (show) => {
            document.getElementById('checkout-modal').classList.toggle('hidden', !show);
            if(!show) window.scrollTo(0,0);
            updateCartUI(); 
        };
    </script>
</head>
<body class="pb-24">

    <!-- Écran de bienvenue et Header restent identiques -->
    <div id="welcome-screen" class="fixed inset-0 z-50 bg-black flex flex-col items-center justify-end pb-20 px-6 text-center">
        <div class="absolute inset-0 opacity-50 bg-[url('https://images.unsplash.com/photo-1552346154-21d32810aba3?q=80&w=2070&auto=format&fit=crop')] bg-cover bg-center"></div>
        <div class="absolute inset-0 bg-gradient-to-t from-black via-black/80 to-transparent"></div>
        <div class="relative z-10 w-full animate-slide-up">
            <h1 class="text-6xl font-black italic text-white mb-2 tracking-tighter uppercase">DRIPRUSH</h1>
            <p class="text-orange-500 text-[10px] font-black uppercase tracking-[0.3em] mb-12">Benin's Premium Streetwear</p>
            <div class="space-y-4">
                <button onclick="enterSite('shop')" class="w-full bg-white text-black py-5 rounded-2xl font-black uppercase italic text-sm shadow-[0_0_30px_rgba(255,255,255,0.3)] active:scale-95 transition-all">Démarrer le Shopping 🛍️</button>
                <button onclick="enterSite('partner')" class="w-full bg-white/10 backdrop-blur-md border border-white/20 text-white py-5 rounded-2xl font-black uppercase italic text-sm active:scale-95 transition-all">Devenir Partenaire 🤝</button>
            </div>
        </div>
    </div>

    <div id="main-content" class="hidden">
        <header class="bg-white px-4 pt-4 pb-2 sticky top-0 z-40 shadow-sm">
            <div class="flex justify-between items-center mb-4">
                <h1 class="text-2xl font-black italic tracking-tighter text-black uppercase">DRIPRUSH</h1>
                <div class="flex items-center gap-5 text-xl">
                    <i class="fa-solid fa-heart text-gray-200"></i>
                    <div onclick="toggleCheckout(true)" class="relative cursor-pointer">
                        <i class="fa-solid fa-bag-shopping"></i>
                        <span id="cart-count" class="absolute -top-2 -right-2 bg-orange-500 text-white text-[10px] font-bold px-1.5 rounded-full border-2 border-white">0</span>
                    </div>
                </div>
            </div>
            <div class="relative mb-4">
                <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
                <input type="text" oninput="searchProducts(this.value)" placeholder="Rechercher un article..." class="w-full bg-gray-100 py-3.5 pl-12 pr-4 rounded-2xl text-xs font-bold outline-none border border-transparent focus:border-black transition uppercase tracking-tight">
            </div>
            <div class="flex gap-2 overflow-x-auto hide-scrollbar pb-2">
                <button onclick="filterByGenre('tout')" id="btn-tout" class="cat-btn active-cat bg-white border border-gray-100 px-6 py-2 rounded-full text-[11px] font-black uppercase tracking-tight shadow-sm transition-all">Tout</button>
                <button onclick="filterByGenre('homme')" id="btn-homme" class="cat-btn bg-white border border-gray-100 px-6 py-2 rounded-full text-[11px] font-black uppercase tracking-tight shadow-sm transition-all">Homme</button>
                <button onclick="filterByGenre('femme')" id="btn-femme" class="cat-btn bg-white border border-gray-100 px-6 py-2 rounded-full text-[11px] font-black uppercase tracking-tight shadow-sm transition-all">Femme</button>
            </div>
        </header>

        <main class="p-3">
            <div id="products-grid" class="grid grid-cols-2 gap-3"></div>
        </main>

        <div id="cart-bar" class="fixed bottom-20 left-4 right-4 bg-white text-black p-4 rounded-3xl flex justify-between items-center hidden shadow-2xl z-30 border border-gray-100">
            <div>
                <p class="text-[8px] font-black uppercase opacity-40">Sous-total</p>
                <p id="cart-total" class="text-lg font-black italic tracking-tighter">0 F</p>
            </div>
            <button onclick="toggleCheckout(true)" class="bg-black text-white px-8 py-3 rounded-2xl font-black uppercase text-[10px] italic active:scale-95 transition">Commander 🚀</button>
        </div>

        <!-- Modals Restants -->
        <div id="product-modal" class="fixed inset-0 bg-black/70 backdrop-blur-sm z-50 flex items-end hidden">
            <div class="w-full bg-white rounded-t-[2.5rem] p-6 space-y-6 animate-slide-up modal-height-fix pb-10">
                <div class="w-12 h-1.5 bg-gray-200 rounded-full mx-auto mb-2"></div>
                <div class="flex gap-4">
                    <img id="modal-img" src="" class="w-32 h-32 object-cover rounded-2xl shadow-lg">
                    <div class="flex-1 py-2">
                        <h2 id="modal-name" class="text-sm font-black uppercase text-gray-800 leading-tight mb-1"></h2>
                        <p id="modal-price" class="text-xl font-black text-black italic"></p>
                    </div>
                </div>
                <div>
                    <p class="text-[10px] font-black text-gray-400 uppercase mb-3 tracking-widest">Choisir Taille</p>
                    <div id="size-container" class="flex flex-wrap gap-2"></div>
                </div>
                <button onclick="addToCart()" class="w-full bg-black text-white py-5 rounded-2xl font-black uppercase italic shadow-xl text-sm">Ajouter au panier 🛍️</button>
            </div>
        </div>

        <!-- Checkout Modal avec Mise à jour des boutons de livraison -->
        <div id="checkout-modal" class="fixed inset-0 bg-white z-50 p-4 flex flex-col hidden overflow-y-auto">
            <div class="flex items-center justify-between mb-6 pt-4 shrink-0">
                <button onclick="toggleCheckout(false)" class="flex items-center gap-2 font-bold text-xs uppercase"><i class="fa-solid fa-chevron-left text-xl"></i> Retour</button>
                <h2 class="text-lg font-black uppercase italic tracking-tighter">Mon Panier</h2>
                <div class="w-5"></div>
            </div>
            <div id="cart-items-list" class="flex-1 px-2 mb-4"></div>
            
            <div class="space-y-6 pb-10">
                <p class="text-[10px] font-black text-gray-400 uppercase tracking-widest text-center">Mode de Livraison de la Boutique</p>
                <div class="grid grid-cols-2 gap-3">
                    <!-- Les libellés de prix se mettent à jour dynamiquement selon la boutique de l'article -->
                    <button onclick="setShipping('standard')" class="ship-btn border border-gray-200 p-4 rounded-2xl text-[10px] font-black uppercase shadow-sm transition" id="lbl-std">🚲 Normale</button>
                    <button onclick="setShipping('express')" class="ship-btn border border-gray-200 p-4 rounded-2xl text-[10px] font-black uppercase shadow-sm transition" id="lbl-exp">🚀 Rapide</button>
                </div>

                <div class="bg-gray-100 p-5 rounded-3xl flex justify-between items-center">
                    <span class="text-[10px] font-black uppercase opacity-50">Total à payer</span>
                    <!-- Le prix Total ne s'affichera qu'APRES le choix de livraison -->
                    <span id="final-total-display" class="text-xl font-black italic text-orange-600">Choisir livraison</span>
                </div>

                <div class="space-y-3">
                    <input id="c-name" placeholder="NOM COMPLET" class="w-full bg-gray-100 p-4 rounded-2xl outline-none text-xs font-bold uppercase border">
                    <input id="c-phone" type="tel" placeholder="NUMÉRO WHATSAPP" class="w-full bg-gray-100 p-4 rounded-2xl outline-none text-xs font-bold uppercase border">
                    <textarea id="c-addr" placeholder="ADRESSE DE LIVRAISON" class="w-full bg-gray-100 p-4 rounded-2xl outline-none text-xs font-bold uppercase h-20 border"></textarea>
                </div>
                <button onclick="confirmOrder()" class="w-full bg-black text-white py-4 rounded-2xl font-black uppercase italic shadow-2xl text-sm">Confirmer la commande ✅</button>
            </div>
        </div>
    </div>

</body>
</html>
