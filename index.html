<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DRIPRUSH - Premium Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8f8f8; }
        .hidden { display: none; }
    </style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, push, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBuzgGc5iumNCurtTpVM5X3_3TK95qbQpc",
            authDomain: "vroomiam.firebaseapp.com",
            databaseURL: "https://vroomiam-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "vroomiam",
            storageBucket: "vroomiam.firebasestorage.app",
            messagingSenderId: "13433812189",
            appId: "1:13433812189:web:40b8ba4b14cb0a4deb9734"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Variables globales
        window.cart = [];
        
        // Initialisation de l'affichage
        window.addEventListener('DOMContentLoaded', () => {
            onValue(ref(db, 'driprush_products'), (snapshot) => {
                const data = snapshot.val();
                const products = data ? Object.values(data) : [];
                renderProducts(products);
            });
        });

        function renderProducts(products) {
            const grid = document.getElementById('products-grid');
            if(!grid) return;
            grid.innerHTML = products.map(p => `
                <div class="bg-white p-4 rounded-2xl shadow-sm">
                    <img src="${p.image}" class="w-full h-40 object-cover rounded-xl">
                    <h3 class="font-bold mt-2">${p.name}</h3>
                    <p class="font-black">${p.price} F</p>
                    <button onclick="alert('Ajouté !')" class="bg-black text-white w-full py-2 mt-2 rounded-lg">Ajouter</button>
                </div>
            `).join('');
        }
    </script>
</head>
<body>
    <div id="welcome-screen" class="fixed inset-0 bg-black flex flex-col items-center justify-center text-white">
        <h1 class="text-5xl font-black mb-10">DRIPRUSH</h1>
        <button onclick="document.getElementById('welcome-screen').classList.add('hidden')" class="bg-white text-black px-8 py-4 rounded-xl font-bold">DÉMARRER</button>
    </div>

    <div id="main-content" class="p-4">
        <h2 class="text-2xl font-bold mb-4">Boutique</h2>
        <div id="products-grid" class="grid grid-cols-2 gap-4"></div>
    </div>
</body>
</html>
