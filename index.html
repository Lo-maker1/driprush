<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DRIPRUSH - Premium Store</title>

    <meta property="og:type" content="website">
    <meta property="og:url" content="https://vroomiam.web.app/">
    <meta property="og:title" content="DRIPRUSH - Premium Store">
    <meta property="og:description" content="Livraison en 15min chrono au Bénin. Qualité premium uniquement. 🔥">
    <meta property="og:image" content="https://i.ibb.co/b58wJF0B/IMG-3395.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.fedapay.com/checkout.js?v=1.1.7"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght=400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8f8f8; color: #1a1a1a; overflow-x: hidden; }
        .active-cat { background-color: #000 !important; color: #fff !important; transform: scale(1.05); }
        .product-card { transition: all 0.3s ease; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
        .animate-marquee { display: inline-block; animation: marquee 20s linear infinite; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .animate-slide-up { animation: slideUp 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .animate-fade-in { animation: fadeIn 0.2s ease-out; }
        .modal-height-fix { max-height: 90vh; overflow-y: auto; }
    </style>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, push, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBuzgGc5iumNCurtTpVM5X3_3TK95qbQpc",
            authDomain: "vroomiam.firebaseapp.com",
            databaseURL: "https://vroomiam-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "vroomiam",
            storageBucket: "vroomiam.firebasestorage.app",
            messagingSenderId: "13433812189",
            appId: "1:13433812189:web:40b8ba4b14cb0a4deb9734"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let cart = [];
        let selectedItem = null;
        let deliveryFee = 0;
        let deliveryTypeSelected = ""; 
        let allProducts = [];

        onValue(ref(db, 'driprush_products'), (snapshot) => {
            const data = snapshot.val();
            allProducts = []; 
            if (data) {
                console.log("=== STRUCTURE DE TES PRODUITS DANS FIREBASE ===");
                console.log(data);
                console.log("================================================");

                allProducts = Object.keys(data).map(id => ({ id, ...data[id] })).reverse();
                window.renderProducts(allProducts);
            }
        });

        window.enterSite = (mode) => {
            if(mode === 'shop') {
                document.getElementById('welcome-screen').classList.add('hidden');
                document.getElementById('main-content').classList.remove('hidden');
            } else if(mode === 'partner') {
                document.getElementById('partner-modal').classList.remove('hidden');
            }
        };

        window.submitPartner = () => {
            const name = document.getElementById('p-name').value;
            const phone = document.getElementById('p-phone').value;
            const loc = document.getElementById('p-loc').value;
            if(!name || !phone || !loc) return alert("Remplissez tous les champs !");
            const message = `Salut DRIPRUSH ! 🔥\n\nNOUVELLE BOUTIQUE PARTENAIRE :\n🏪 Nom: ${name}\n📞 Contact: ${phone}\n📍 Localisation: ${loc}`;
            window.open(`https://wa.me/2290147535343?text=${encodeURIComponent(message)}`, '_blank');
            document.getElementById('partner-modal').classList.add('hidden');
        };

        window.renderProducts = (products) => {
            const grid = document.getElementById('products-grid');
            grid.innerHTML = '';
            products.forEach(p => {
                const pShopName = p.shopName && p.shopName.trim() !== "" ? p.shopName : "Driprush";
                const pShopPhone = p.shopPhone && p.shopPhone.trim() !== "" ? p.shopPhone : "2290147535343";

                const safeId = (p.id || "").replace(/'/g, "\\'");
                const safeName = (p.name || "").replace(/'/g, "\\'");
                const safePrice = (p.price || "0").toString().replace(/'/g, "\\'");
                const safeImage = (p.image || "").replace(/'/g, "\\'");
                const safeSizes = (p.sizes || "").replace(/'/g, "\\'");
                const safeShop = pShopName.replace(/'/g, "\\'");
                const safeGPS = (p.shopGPS || '').replace(/'/g, "\\'");
                const safePhone = pShopPhone.replace(/'/g, "\\'");
                const deliveryStd = p.deliveryStandard || 0;
                const deliveryExp = p.deliveryExpress || 0;

                grid.innerHTML += `
                    <div class="product-card bg-white rounded-2xl overflow-hidden shadow-sm relative border border-gray-50 active:scale-95 transition cursor-pointer" onclick="window.openModal('${safeId}', '${safeName}', '${safePrice}', '${safeImage}', '${safeSizes}', '${safeShop}', '${safeGPS}', '${safePhone}', ${deliveryStd}, ${deliveryExp})">
                        <button class="absolute top-3 right-3 z-10 text-gray-300 hover:text-red-500 transition" onclick="event.stopPropagation(); this.classList.toggle('text-red-500')">
                            <i class="fa-solid fa-heart text-lg"></i>
                        </button>
                        <img src="${safeImage}" class="w-full h-52 object-cover" loading="lazy">
                        <div class="p-3">
                            <p class="text-[9px] text-gray-400 font-black uppercase mb-1">${pShopName}</p>
                            <h3 class="text-[11px] font-bold text-gray-800 leading-tight h-8 line-clamp-2 uppercase">${p.name}</h3>
                            <div class="mt-3 flex items-center justify-between">
                                <span class="text-[13px] font-black text-black">${parseInt(p.price).toLocaleString()} F</span>
                                <div class="bg-black text-white w-7 h-7 rounded-full flex items-center justify-center">
                                    <i class="fa-solid fa-plus text-[10px]"></i>
                                </div>
                            </div>
                        </div>
                    </div>`;
            });
            if(products.length === 0) {
                grid.innerHTML = '<div class="col-span-2 text-center py-20 text-gray-400 font-bold italic uppercase text-xs">Aucun article trouvé...</div>';
            }
        };

        window.filterByGenre = (genre) => {
            document.querySelectorAll('.cat-btn').forEach(btn => btn.classList.remove('active-cat'));
            document.getElementById(`btn-${genre}`).classList.add('active-cat');
            if (genre === 'tout') { window.renderProducts(allProducts); } 
            else { window.renderProducts(allProducts.filter(p => p.genre && p.genre.toLowerCase() === genre.toLowerCase())); }
        };

        window.searchProducts = (query) => {
            window.renderProducts(allProducts.filter(p => p.name.toLowerCase().includes(query.toLowerCase().trim())));
        };

        window.openModal = (id, name, price, image, sizes, shop, shopGPS, shopPhone, deliveryStandard, deliveryExpress) => {
            selectedItem = { id, name, price, image, shop, shopGPS, shopPhone, deliveryStandard, deliveryExpress, size: null };
            
            document.getElementById('modal-img').src = image;
            document.getElementById('modal-name').innerText = name;
            document.getElementById('modal-price').innerText = parseInt(price).toLocaleString() + " F";
            
            const container = document.getElementById('size-container');
            container.innerHTML = '';
            
            if(sizes && sizes !== "N/A" && sizes.trim() !== "") {
                const sizeArray = sizes.split(',');
                sizeArray.forEach((s, idx) => {
                    const cleanSize = s.trim().replace(/'/g, "\\'");
                    const isFirst = idx === 0 ? 'bg-black text-white border-black' : '';
                    if(idx === 0) selectedItem.size = s.trim(); 
                    
                    container.innerHTML += `<button onclick="window.selectSize(this, '${cleanSize}')" class="size-btn border border-gray-200 px-4 py-2 rounded-xl text-[10px] font-bold uppercase transition hover:border-black ${isFirst}">${s.trim()}</button>`;
                });
            } else {
                selectedItem.size = "Unique"; 
                container.innerHTML = `<button onclick="window.selectSize(this, 'Unique')" class="size-btn bg-black text-white border-black border px-4 py-2 rounded-xl text-[10px] font-bold uppercase transition">Taille Unique</button>`;
            }
            document.getElementById('product-modal').classList.remove('hidden');
        };

        window.closeModalOutside = (event) => {
            if(!event || event.target.id === 'product-modal' || event.target.closest('#close-modal-btn')) {
                document.getElementById('product-modal').classList.add('hidden');
            }
        };

        window.toggleZoom = (show) => {
            const zoomModal = document.getElementById('zoom-modal');
            if(show && selectedItem) {
                document.getElementById('zoom-img').src = selectedItem.image;
                zoomModal.classList.remove('hidden');
            } else {
                zoomModal.classList.add('hidden');
            }
        };

        window.selectSize = (element, size) => {
            if(!selectedItem) return;
            selectedItem.size = size;
            document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('bg-black', 'text-white', 'border-black'));
            element.classList.add('bg-black', 'text-white', 'border-black');
        };

        window.addToCart = () => {
            if(!selectedItem || !selectedItem.size) {
                return alert("Sélectionne une taille d'abord !");
            }
            
            if (cart.length > 0) {
                // Fonction interne pour extraire uniquement les chiffres (ex: "+229 01..." devient "22901...")
                const cleanPhone = (num) => String(num || "").replace(/\D/g, "");

                // CORRECTION ICI : cart au lieu de cart pour cibler le premier produit du tableau
                const currentCartShopPhone = cleanPhone(cart.shopPhone || "2290147535343");
                const newShopPhone = cleanPhone(selectedItem.shopPhone || "2290147535343");
                const currentCartShopName = cart.shop || "Driprush";

                if (currentCartShopPhone !== newShopPhone && currentCartShopPhone.length > 5 && newShopPhone.length > 5) {
                    alert(`Logistique : Ton panier contient déjà des articles de la boutique "${currentCartShopName}". Termine cette commande ou vide ton panier actuel d'abord !`);
                    return;
                }
            }

            cart.push({...selectedItem, validated: false});
            deliveryFee = 0;
            deliveryTypeSelected = "";
            
            window.updateCartUI();
            document.getElementById('product-modal').classList.add('hidden');
        };

        window.updateCartUI = () => {
            document.getElementById('nav-cart-count').innerText = cart.length;
            const isCheckoutHidden = document.getElementById('checkout-modal').classList.contains('hidden');
            const hasPending = cart.some(i => !i.validated);
            document.getElementById('cart-bar').classList.toggle('hidden', !hasPending || !isCheckoutHidden);
            
            let subtotal = 0; 
            const listContainer = document.getElementById('cart-items-list');
            listContainer.innerHTML = '';

            cart.forEach((item, index) => {
                if(!item.validated) subtotal += parseInt(item.price);
                listContainer.innerHTML += `
                    <div class="flex items-center gap-3 bg-gray-50 p-3 rounded-2xl border border-gray-100 mb-2">
                        <img src="${item.image}" class="w-12 h-12 object-cover rounded-lg">
                        <div class="flex-1">
                            <p class="text-[10px] font-bold uppercase">${item.name} (${item.size})</p>
                            <p class="text-black text-[11px] font-black">${parseInt(item.price).toLocaleString()} F</p>
                        </div>
                        ${item.validated ? 
                            '<span class="text-[7px] font-black text-green-500 bg-green-500/10 px-2 py-1 rounded-full uppercase">Validée</span>' : 
                            `<button onclick="window.removeFromCart(${index})" class="text-red-500 text-xs px-2"><i class="fa-solid fa-trash-can"></i></button>`
                        }
                    </div>`;
            });
            document.getElementById('cart-total').innerText = subtotal.toLocaleString() + " F";

            if(cart.length > 0) {
                // CORRECTION ICI : cart au lieu de cart
                const first = cart;
                document.getElementById('lbl-std').innerText = `🚲 Normale (+${first.deliveryStandard || 0} F)`;
                document.getElementById('lbl-exp').innerText = `🚀 Rapide (+${first.deliveryExpress || 0} F)`;
                if(deliveryTypeSelected === "standard") deliveryFee = first.deliveryStandard || 0;
                else if(deliveryTypeSelected === "express") deliveryFee = first.deliveryExpress || 0;
            }

            const totalDisplay = document.getElementById('final-total-display');
            if(deliveryFee > 0) totalDisplay.innerText = (subtotal + deliveryFee).toLocaleString() + " F";
            else totalDisplay.innerText = "Choisir livraison";
        };

        window.removeFromCart = (index) => {
            cart.splice(index, 1);
            deliveryFee = 0;
            deliveryTypeSelected = "";
            window.updateCartUI();
        };

        window.setShipping = (type, element) => {
            if(cart.length === 0) return;
            deliveryTypeSelected = type;
            document.querySelectorAll('.ship-btn').forEach(b => b.classList.remove('bg-black', 'text-white'));
            element.classList.add('bg-black', 'text-white');
            window.updateCartUI();
        };

        window.confirmOrder = (element) => {
            const name = document.getElementById('c-name').value;
            const phone = document.getElementById('c-phone').value;
            const addr = document.getElementById('c-addr').value;
            const pendingItems = cart.filter(i => !i.validated);

            if(pendingItems.length === 0) return alert("Aucun article à commander !");
            if(!name || !phone || !addr || deliveryFee === 0) return alert("Infos manquantes ou livraison non choisie !");

            const originalText = element.innerText;
            element.innerText = "CONNEXION GPS... ⏳";
            element.disabled = true;

            navigator.geolocation.getCurrentPosition((pos) => {
                const gps = `http://maps.google.com/?q=${pos.coords.latitude},${pos.coords.longitude}`;
                window.triggerFedaPay(name, phone, addr, gps, element, originalText);
            }, () => {
                window.triggerFedaPay(name, phone, addr, "GPS Refusé", element, originalText);
            }, { timeout: 8000 });
        };

        window.triggerFedaPay = (name, phone, addr, gps, btn, originalText) => {
            const pendingItems = cart.filter(i => !i.validated);
            let subtotal = 0; 
            pendingItems.forEach(i => subtotal += parseInt(i.price));
            const finalTotal = subtotal + deliveryFee;

            FedaPay.init({
                public_key: 'pk_sandbox_A7pGv9zX8bN3mQ1vL2r5K4tJ',
                environment: 'sandbox'
            });

            FedaPay.open({
                amount: finalTotal,
                currency: { iso: 'XOF' },
                title: 'Paiement Commande DRIPRUSH',
                description: `Achat de ${pendingItems.length} article(s)`,
                customer: { firstname: name, lastname: 'Client', email: 'client@driprush.com', phone_number: { number: phone, country: 'BJ' } },
                onComplete: function(response) {
                    if (response.status === 'approved' || response.status === 'successful') {
                        window.saveAutomatedOrder(name, phone, addr, gps, finalTotal, pendingItems);
                    } else {
                        alert("Paiement échoué.");
                        btn.innerText = originalText;
                        btn.disabled = false;
                    }
                },
                onClose: function() {
                    btn.innerText = originalText;
                    btn.disabled = false;
                }
            });
        };

        window.saveAutomatedOrder = (name, phone, addr, gps, finalTotal, pendingItems) => {
            // CORRECTION ICI : pendingItems au lieu de pendingItems
            const firstItem = pendingItems; 
            const orderRef = push(ref(db, 'driprush_orders'));

            set(orderRef, {
                clientName: name, phone, address: addr, clientGPS: gps,
                shopName: firstItem.shop || 'Driprush', shopGPS: firstItem.shopGPS || '', shopPhone: firstItem.shopPhone || '2290147535343',
                items: pendingItems.map(i => `${i.name} [${i.size}]`).join(', '),
                deliveryMode: deliveryTypeSelected, total: finalTotal, status: 'Payée', timestamp: Date.now()
            }).then(() => {
                const itemsList = pendingItems.map(i => `- ${i.name} (Taille: ${i.size})`).join('\n');
                const whatsappMessage = `🔥 *NOUVELLE COMMANDE DRIPRUSH PAYÉE* 🔥\n\n🏪 *Boutique:* ${firstItem.shop || 'Driprush'}\n📦 *Articles:*\n${itemsList}\n🚲 *Livraison:* ${deliveryTypeSelected.toUpperCase()}\n💰 *Total:* ${finalTotal.toLocaleString()} F CFA\n👤 *Client:* ${name}\n📞 *Contact:* ${phone}\n📍 *Adresse:* ${addr}\n🗺️ *GPS:* ${gps}`;
                const targetPhone = firstItem.shopPhone || "2290147535343";
                window.open(`https://wa.me/${targetPhone}?text=${encodeURIComponent(whatsappMessage)}`, '_blank');
                cart = []; 
                window.updateCartUI();
                document.getElementById('checkout-modal').classList.add('hidden');
            });
        };

        window.toggleCheckout = (show) => {
            document.getElementById('checkout-modal').classList.toggle('hidden', !show);
            if(!show) window.scrollTo(0,0);
            window.updateCartUI(); 
        };
    </script>
</head>
<body class="pb-24">

    <div id="welcome-screen" class="fixed inset-0 z-50 bg-black flex flex-col items-center justify-end pb-20 px-6 text-center">
        <div class="absolute inset-0 opacity-50 bg-[url('https://images.unsplash.com/photo-1552346154-21d32810aba3?q=80&w=2070&auto=format&fit=crop')] bg-cover bg-center"></div>
        <div class="absolute inset-0 bg-gradient-to-t from-black via-black/80 to-transparent"></div>
        <div class="relative z-10 w-full animate-slide-up">
            <h1 class="text-6xl font-black italic text-white mb-2 tracking-tighter uppercase">DRIPRUSH</h1>
            <p class="text-orange-500 text-[10px] font-black uppercase tracking-[0.3em] mb-12">Benin's Premium Streetwear</p>
            <div class="space-y-4">
                <button onclick="window.enterSite('shop')" class="w-full bg-white text-black py-5 rounded-2xl font-black uppercase italic text-sm shadow-[0_0_30px_rgba(255,255,255,0.3)] active:scale-95 transition-all">Démarrer le Shopping 🛍️</button>
                <button onclick="window.enterSite('partner')" class="w-full bg-white/10 backdrop-blur-md border border-white/20 text-white py-5 rounded-2xl font-black uppercase italic text-sm active:scale-95 transition-all">Devenir Partenaire 🤝</button>
            </div>
        </div>
    </div>

    <div id="main-content" class="hidden">
        <header class="bg-white px-4 pt-4 pb-2 sticky top-0 z-40 shadow-sm">
            <div class="flex justify-between items-center mb-4">
                <h1 class="text-2xl font-black italic tracking-tighter text-black uppercase">DRIPRUSH</h1>
                <div class="flex items-center gap-5 text-xl">
                    <i class="fa-solid fa-heart text-gray-200"></i>
                    <div onclick="window.toggleCheckout(true)" class="relative cursor-pointer">
                        <i class="fa-solid fa-bag-shopping"></i>
                        <span id="nav-cart-count" class="absolute -top-2 -right-2 bg-orange-500 text-white text-[10px] font-bold px-1.5 rounded-full border-2 border-white">0</span>
                    </div>
                </div>
            </div>
            <div class="relative mb-4">
                <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
                <input type="text" oninput="window.searchProducts(this.value)" placeholder="Rechercher un article..." class="w-full bg-gray-100 py-3.5 pl-12 pr-4 rounded-2xl text-xs font-bold outline-none border border-transparent focus:border-black transition uppercase tracking-tight">
            </div>
            <div class="flex gap-2 overflow-x-auto hide-scrollbar pb-2">
                <button onclick="window.filterByGenre('tout')" id="btn-tout" class="cat-btn active-cat bg-white border border-gray-100 px-6 py-2 rounded-full text-[11px] font-black uppercase tracking-tight shadow-sm transition-all">Tout</button>
                <button onclick="window.filterByGenre('homme')" id="btn-homme" class="cat-btn bg-white border border-gray-100 px-6 py-2 rounded-full text-[11px] font-black uppercase tracking-tight shadow-sm transition-all">Homme</button>
                <button onclick="window.filterByGenre('femme')" id="btn-femme" class="cat-btn bg-white border border-gray-100 px-6 py-2 rounded-full text-[11px] font-black uppercase tracking-tight shadow-sm transition-all">Femme</button>
            </div>
        </header>

        <main class="p-3">
            <div id="products-grid" class="grid grid-cols-2 gap-3"></div>
        </main>

        <div id="cart-bar" class="fixed bottom-20 left-4 right-4 bg-white text-black p-4 rounded-3xl flex justify-between items-center hidden shadow-2xl z-30 border border-gray-100">
            <div>
                <p class="text-[8px] font-black uppercase opacity-40">Sous-total</p>
                <p id="cart-total" class="text-lg font-black italic tracking-tighter">0 F</p>
            </div>
            <button onclick="window.toggleCheckout(true)" class="bg-black text-white px-8 py-3 rounded-2xl font-black uppercase text-[10px] italic active:scale-95 transition">Commander 🚀</button>
        </div>

        <div id="product-modal" onclick="window.closeModalOutside(event)" class="fixed inset-0 bg-black/70 backdrop-blur-sm z-50 flex items-end hidden cursor-pointer">
            <div class="w-full bg-white rounded-t-[2.5rem] p-6 space-y-6 animate-slide-up modal-height-fix pb-10 cursor-default relative">
                <button id="close-modal-btn" onclick="window.closeModalOutside(null)" class="absolute top-4 right-6 text-gray-400 hover:text-black transition text-xl p-2">
                    <i class="fa-solid fa-xmark"></i>
                </button>
                <div class="w-12 h-1.5 bg-gray-200 rounded-full mx-auto mb-2"></div>
                <div class="flex gap-4">
                    <img id="modal-img" src="" onclick="window.toggleZoom(true)" class="w-32 h-32 object-cover rounded-2xl shadow-lg cursor-zoom-in active:scale-95 transition duration-200">
                    <div class="flex-1 py-2">
                        <h2 id="modal-name" class="text-sm font-black uppercase text-gray-800 leading-tight mb-1"></h2>
                        <p id="modal-price" class="text-xl font-black text-black italic"></p>
                        <p class="text-[9px] text-orange-600 font-bold uppercase mt-2 bg-orange-50 inline-block px-2 py-1 rounded-md"><i class="fa-solid fa-magnifying-glass-plus mr-1"></i> Touche la photo pour zoomer</p>
                    </div>
                </div>
                <div>
                    <p class="text-[10px] font-black text-gray-400 uppercase mb-3 tracking-widest">Choisir Taille</p>
                    <div id="size-container" class="flex flex-wrap gap-2"></div>
                </div>
                <button onclick="window.addToCart()" class="w-full bg-black text-white py-5 rounded-2xl font-black uppercase italic shadow-xl text-sm active:scale-95 transition">Ajouter au panier 🛍️</button>
            </div>
        </div>

        <div id="zoom-modal" onclick="window.toggleZoom(false)" class="fixed inset-0 bg-black/95 z-50 flex items-center justify-center p-4 hidden animate-fade-in cursor-zoom-out">
            <button onclick="window.toggleZoom(false)" class="absolute top-6 right-6 text-white text-2xl opacity-70 hover:opacity-100 transition"><i class="fa-solid fa-xmark"></i></button>
            <img id="zoom-img" src="" class="max-w-full max-h-[85vh] rounded-2xl object-contain shadow-2xl">
        </div>

        <div id="checkout-modal" class="fixed inset-0 bg-white z-50 p-4 flex flex-col hidden overflow-y-auto">
            <div class="flex items-center justify-between mb-6 pt-4 shrink-0">
                <button onclick="window.toggleCheckout(false)" class="flex items-center gap-2 font-bold text-xs uppercase"><i class="fa-solid fa-chevron-left text-xl"></i> Retour</button>
                <h2 class="text-lg font-black uppercase italic tracking-tighter">Mon Panier</h2>
                <div class="w-5"></div>
            </div>
            <div id="cart-items-list" class="flex-1 px-2 mb-4"></div>

            <div class="space-y-6 pb-10">
                <p class="text-[10px] font-black text-gray-400 uppercase tracking-widest text-center">Mode de Livraison de la Boutique</p>
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="window.setShipping('standard', this)" class="ship-btn border border-gray-200 p-4 rounded-2xl text-[10px] font-black uppercase shadow-sm transition" id="lbl-std">🚲 Normale</button>
                    <button onclick="window.setShipping('express', this)" class="ship-btn border border-gray-200 p-4 rounded-2xl text-[10px] font-black uppercase shadow-sm transition" id="lbl-exp">🚀 Rapide</button>
                </div>

                <div class="bg-gray-100 p-5 rounded-3xl flex justify-between items-center">
                    <span class="text-[10px] font-black uppercase opacity-50">Total à payer</span>
                    <span id="final-total-display" class="text-xl font-black italic text-orange-600">Choisir livraison</span>
                </div>

                <div class="space-y-3">
                    <input id="c-name" placeholder="NOM COMPLET" class="w-full bg-gray-100 p-4 rounded-2xl outline-none text-xs font-bold uppercase border">
                    <input id="c-phone" type="tel" placeholder="NUMÉRO WHATSAPP" class="w-full bg-gray-100 p-4 rounded-2xl outline-none text-xs font-bold uppercase border">
                    <textarea id="c-addr" placeholder="ADRESSE DE LIVRAISON" class="w-full bg-gray-100 p-4 rounded-2xl outline-none text-xs font-bold uppercase h-20 border"></textarea>
                </div>
                <button onclick="window.confirmOrder(this)" class="w-full bg-black text-white py-4 rounded-2xl font-black uppercase italic shadow-2xl text-sm">Confirmer la commande ✅</button>
            </div>
        </div>
    </div>

    <div id="partner-modal" class="fixed inset-0 bg-black/80 backdrop-blur-md z-50 flex items-center justify-center hidden p-4">
        <div class="bg-white text-black p-6 rounded-3xl w-full max-w-sm space-y-4">
            <h3 class="text-sm font-black uppercase tracking-tight">Ouvrir un rayon sur DRIPRUSH</h3>
            <p class="text-[11px] text-gray-500 font-medium">Proposez vos articles streetwear premium sur notre catalogue.</p>
            <input id="p-name" placeholder="NOM DE VOTRE ENSEIGNE" class="w-full bg-gray-100 p-4 rounded-xl text-xs font-bold uppercase outline-none border">
            <input id="p-phone" placeholder="NUMÉRO WHATSAPP BOUTIQUE" class="w-full bg-gray-100 p-4 rounded-xl text-xs font-bold outline-none border">
            <input id="p-loc" placeholder="QUARTIER & VILLE" class="w-full bg-gray-100 p-4 rounded-xl text-xs font-bold uppercase outline-none border">
            <div class="flex gap-2 pt-2">
                <button onclick="document.getElementById('partner-modal').classList.add('hidden')" class="flex-1 bg-gray-100 text-black py-3 rounded-xl text-[10px] font-black uppercase">Annuler</button>
                <button onclick="window.submitPartner()" class="flex-1 bg-black text-white py-3 rounded-xl text-[10px] font-black uppercase">Soumettre 🤝</button>
            </div>
        </div>
    </div>

</body>
</html>
