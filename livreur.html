<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DRIPRUSH - Espace Livreur</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .online-dot { animation: pulse-green 2s infinite; }
        @keyframes pulse-green {
            0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(34, 197, 94, 0); }
            100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
        }
    </style>
</head>
<body class="bg-gray-900 text-white font-sans flex flex-col items-center justify-center min-h-screen p-6">

    <div id="setup-card" class="w-full max-w-md bg-gray-800 rounded-[2.5rem] p-8 shadow-2xl border border-gray-700 text-center">
        <div class="mb-6">
            <h1 class="text-2xl font-black italic text-orange-500 uppercase">Driprush Identification</h1>
            <p class="text-gray-400 text-sm">Entrez vos infos pour livrer</p>
        </div>

        <div class="space-y-4 mb-6">
            <input type="text" id="driver-name" placeholder="Votre Nom complet" class="w-full bg-gray-900 border border-gray-700 rounded-2xl px-5 py-4 text-white focus:border-orange-500 outline-none transition">
            <input type="tel" id="driver-phone" placeholder="Numéro WhatsApp (ex: 22900000000)" class="w-full bg-gray-900 border border-gray-700 rounded-2xl px-5 py-4 text-white focus:border-orange-500 outline-none transition">
        </div>

        <button id="validate-btn" class="w-full bg-orange-500 text-white font-black py-5 rounded-2xl text-xl transition active:scale-95 shadow-xl">
            VALIDER MES INFOS
        </button>
    </div>

    <div id="tracking-card" class="hidden w-full max-w-md bg-gray-800 rounded-[2.5rem] p-8 shadow-2xl border border-gray-700 text-center">
        <div class="mb-6">
            <h1 class="text-2xl font-black italic text-orange-500 uppercase">Driprush Delivery</h1>
            <p id="welcome-text" class="text-gray-400 text-sm font-bold uppercase"></p>
        </div>

        <div id="status-card" class="bg-gray-700/50 rounded-2xl p-6 mb-8 border border-red-500/30">
            <div id="status-dot" class="w-4 h-4 bg-red-500 rounded-full mx-auto mb-2"></div>
            <p id="status-text" class="text-lg font-bold uppercase tracking-widest">Hors Ligne</p>
            <p id="phone-display" class="text-[10px] text-gray-500 mt-2"></p>
        </div>

        <button id="toggle-btn" class="w-full bg-white text-black font-black py-5 rounded-2xl text-xl transition active:scale-95 shadow-xl">
            PRENDRE LE SERVICE
        </button>

        <button onclick="location.reload()" class="mt-4 text-gray-500 text-xs underline">Changer d'utilisateur</button>
    </div>

    <script type="module">
        // --- CONFIGURATION FIREBASE ---
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBuzgGc5iumNCurtTpVM5X3_3TK95qbQpc",
            authDomain: "vroomiam.firebaseapp.com",
            databaseURL: "https://vroomiam-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "vroomiam",
            storageBucket: "vroomiam.firebasestorage.app",
            messagingSenderId: "13433812189",
            appId: "1:13433812189:web:40b8ba4b14cb0a4deb9734"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let isTracking = false;
        let watchID = null;
        let driverData = { name: "", phone: "" };

        // 1. Enregistrer les infos et afficher l'interface de service
        window.saveAndShowTracking = function() {
            const nameInput = document.getElementById('driver-name').value;
            const phoneInput = document.getElementById('driver-phone').value;

            if (nameInput.trim() === "" || phoneInput.trim() === "") {
                alert("Oups ! Il faut ton nom et ton numéro WhatsApp pour continuer.");
                return;
            }

            driverData.name = nameInput;
            driverData.phone = phoneInput.replace(/\s/g, ''); // Enlève les espaces

            document.getElementById('setup-card').classList.add('hidden');
            document.getElementById('tracking-card').classList.remove('hidden');
            document.getElementById('welcome-text').innerText = "Salut, " + driverData.name;
            document.getElementById('phone-display').innerText = "WhatsApp : " + driverData.phone;
        };

        // 2. Activer/Désactiver le GPS
        window.toggleTracking = function() {
            const btn = document.getElementById('toggle-btn');
            const dot = document.getElementById('status-dot');
            const text = document.getElementById('status-text');
            const card = document.getElementById('status-card');

            if (!isTracking) {
                if ("geolocation" in navigator) {
                    isTracking = true;
                    btn.innerText = "ARRÊTER LE SERVICE";
                    btn.classList.replace('bg-white', 'bg-red-500');
                    btn.classList.add('text-white');
                    dot.classList.replace('bg-red-500', 'bg-green-500');
                    dot.classList.add('online-dot');
                    text.innerText = "En ligne - Tracking Actif";
                    text.classList.add('text-green-400');
                    card.classList.replace('border-red-500/30', 'border-green-500/30');

                    watchID = navigator.geolocation.watchPosition(updateLocation, handleError, {
                        enableHighAccuracy: true,
                        maximumAge: 10000,
                        timeout: 15000
                    });
                } else {
                    alert("Le GPS n'est pas supporté par ce navigateur.");
                }
            } else {
                isTracking = false;
                if (watchID) navigator.geolocation.clearWatch(watchID);
                
                // Supprimer le livreur de la base quand il arrête le service
                remove(ref(db, 'livreurs/' + driverData.phone));

                btn.innerText = "PRENDRE LE SERVICE";
                btn.classList.replace('bg-red-500', 'bg-white');
                btn.classList.remove('text-white');
                dot.classList.replace('bg-green-500', 'bg-red-500');
                dot.classList.remove('online-dot');
                text.innerText = "Hors Ligne";
                text.classList.remove('text-green-400');
                card.classList.replace('border-green-500/30', 'border-red-500/30');
            }
        };

        // 3. Envoyer les données à la base de données
        function updateLocation(position) {
            const lat = position.coords.latitude;
            const lng = position.coords.longitude;
            
            const payload = {
                nom: driverData.name,
                whatsapp: driverData.phone,
                lat: lat,
                lng: lng,
                lastSeen: new Date().toLocaleTimeString(),
                timestamp: Date.now() // AJOUT : Indispensable pour le nettoyage auto côté Admin
            };

            // ENVOI RÉEL À FIREBASE
            set(ref(db, 'livreurs/' + driverData.phone), payload);
            console.log("Position mise à jour sur Firebase avec Timestamp");
        }

        function handleError(err) {
            console.warn('Erreur GPS: ' + err.message);
        }

        // Liaison des boutons aux fonctions (nécessaire car script type="module")
        document.getElementById('validate-btn').onclick = window.saveAndShowTracking;
        document.getElementById('toggle-btn').onclick = window.toggleTracking;
    </script>
</body>
</html>
